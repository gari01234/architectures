<script>
document.getElementById('json-upload').addEventListener('change', function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const config = JSON.parse(e.target.result);

      // Permutations
      if (config.perms && Array.isArray(config.perms)) {
        const sel = document.getElementById('permutationList');
        Array.from(sel.options).forEach(o => o.selected = config.perms.includes(o.value));
      }

      // Mapping
      if (config.mapping) {
        const v = [config.mapping.forma, config.mapping.color, config.mapping.x, config.mapping.y, config.mapping.z];
        document.getElementById('attrMapping').value = v.join(',');
        attributeMapping = [v[0], v[1], v[2], v[3], v[4], attributeMapping[5], attributeMapping[6]];
      }

      // Chroma mode + overrides con fallback a formatos legacy
permOverride = {};
bgOverride = null;
cubeOverride = null;

if (config.overrides && typeof config.overrides === 'object') {
  // Nuevo: overrides.perms (por permStr)
  const permsOv = (config.overrides.perms && typeof config.overrides.perms === 'object')
    ? config.overrides.perms
    : {};

  Object.entries(permsOv).forEach(([ps, c]) => {
    const h = normHex6(c);
    if (h) permOverride[ps] = h;
  });

  // Legacy dentro de overrides: overrides.channels (1..5)
  const ch = (config.overrides.channels && typeof config.overrides.channels === 'object')
    ? config.overrides.channels
    : null;

  if (ch) {
    const channelMap = {};
    Object.entries(ch).forEach(([i, c]) => {
      const k = Number(i);
      const h = normHex6(c);
      if (k>=1 && k<=5 && h) channelMap[k] = h;
    });
    applyChannelOverridesToSelected(channelMap);
  }

  bgOverride   = normHex6(config.overrides.bg)   || null;
  cubeOverride = normHex6(config.overrides.cube) || null;
} else {
  // Legacy: config.colors (puede ser 1..5 o { "1,2,3,4,5": "#rrggbb" })
  if (config.colors && typeof config.colors === 'object') {
    const keys = Object.keys(config.colors);
    const looksLikePermMap = keys.some(k => k.includes(','));

    if (looksLikePermMap) {
      Object.entries(config.colors).forEach(([ps, c]) => {
        const h = normHex6(c);
        if (h) permOverride[ps] = h;
      });
    } else {
      const channelMap = {};
      Object.entries(config.colors).forEach(([i, c]) => {
        const k = Number(i);
        const h = normHex6(c);
        if (k>=1 && k<=5 && h) channelMap[k] = h;
      });
      applyChannelOverridesToSelected(channelMap);
    }
  }

  bgOverride   = normHex6(config.bg)   || null;
  cubeOverride = normHex6(config.cube) || null;
}

// Modo explícito si viene; si no, inferimos
if (typeof config.chroma_mode === 'string') {
  setChromaMode(config.chroma_mode.toUpperCase() === 'HABITATED' ? 'HABITATED' : 'CANONICAL');
} else {
  setChromaMode(hasOverrides() ? 'HABITATED' : 'CANONICAL');
}

      // Scene invariants (optional)
      if (typeof config.sceneSeed === 'number') {
        sceneSeed = config.sceneSeed;
      }
      if (typeof config.S_global === 'number') {
        S_global = config.S_global;
      }

      // View
      const view = config.view || "front";
      document.getElementById('standardView').value = view;

      // Rebuild
      refreshAll({rebuild:true});
      applyStandardView();

      alert('JSON loaded successfully');
    } catch (err) {
      alert('Error loading JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
});
</script>

function updateRasterGridContrast(){
  const bg = new THREE.Color(__bgHexSRGB || '#ffffff');
  const luma = 0.2126 * bg.r + 0.7152 * bg.g + 0.0722 * bg.b;
  const inkHex = luma > 0.55 ? '#111111' : '#f2f2f2';

  if (rasterGridMaterial){
    rasterGridMaterial.color.setStyle(inkHex);
    rasterGridMaterial.color.convertSRGBToLinear();
    rasterGridMaterial.opacity = luma > 0.55 ? 0.30 : 0.38;
    rasterGridMaterial.needsUpdate = true;
  }

  if (rasterCenterMaterial){
    rasterCenterMaterial.color.setStyle(inkHex);
    rasterCenterMaterial.color.convertSRGBToLinear();
    rasterCenterMaterial.opacity = luma > 0.55 ? 0.65 : 0.78;
    rasterCenterMaterial.needsUpdate = true;
  }
}

function createRasterGridHelper(){
  const group = new THREE.Group();
  const step = cubeSize / 5;

  const borderVals = [];
  const centerVals = [];

  for (let i = 0; i <= 5; i++){
    borderVals.push(-halfCube + i * step);
  }

  for (let i = 0; i < 5; i++){
    centerVals.push(-halfCube + (step * 0.5) + i * step);
  }

  const lineVerts = [];
  const pushLine = (x1, y1, z1, x2, y2, z2) => {
    lineVerts.push(x1, y1, z1, x2, y2, z2);
  };

  // Líneas paralelas a X
  borderVals.forEach(y=>{
    borderVals.forEach(z=>{
      pushLine(-halfCube, y, z, halfCube, y, z);
    });
  });

  // Líneas paralelas a Y
  borderVals.forEach(x=>{
    borderVals.forEach(z=>{
      pushLine(x, -halfCube, z, x, halfCube, z);
    });
  });

  // Líneas paralelas a Z
  borderVals.forEach(x=>{
    borderVals.forEach(y=>{
      pushLine(x, y, -halfCube, x, y, halfCube);
    });
  });

  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(lineVerts, 3));

  rasterGridMaterial = new THREE.LineBasicMaterial({
    color: 0x111111,
    transparent: true,
    opacity: 0.30,
    depthTest: false,
    depthWrite: false,
    toneMapped: false
  });
  rasterGridMaterial.color.convertSRGBToLinear();

  const lines = new THREE.LineSegments(lineGeo, rasterGridMaterial);
  lines.renderOrder = 9999;
  lines.frustumCulled = false;
  group.add(lines);

  // 125 centros reales de celda: x,y,z ∈ {-12,-6,0,6,12}
  const centerVerts = [];
  centerVals.forEach(x=>{
    centerVals.forEach(y=>{
      centerVals.forEach(z=>{
        centerVerts.push(x, y, z);
      });
    });
  });

  const pointGeo = new THREE.BufferGeometry();
  pointGeo.setAttribute('position', new THREE.Float32BufferAttribute(centerVerts, 3));

  rasterCenterMaterial = new THREE.PointsMaterial({
    color: 0x111111,
    size: 5,
    sizeAttenuation: false,
    transparent: true,
    opacity: 0.65,
    depthTest: false,
    depthWrite: false,
    toneMapped: false
  });
  rasterCenterMaterial.color.convertSRGBToLinear();

  const points = new THREE.Points(pointGeo, rasterCenterMaterial);
  points.renderOrder = 10000;
  points.frustumCulled = false;
  group.add(points);

  group.visible = false;
  updateRasterGridContrast();
  return group;
}

/* Compatibilidad: aplicar overrides legacy 1..5 a las permutaciones seleccionadas
   usando el “atributo color” del mapping (attributeMapping[1]) */
function applyChannelOverridesToSelected(channelMap){
  const sel = document.getElementById('permutationList');
  if(!sel) return;

  const permStrs = Array.from(sel.selectedOptions).map(o=>o.value);
  permStrs.forEach(ps=>{
    const pa = permStrToArray(ps);
    const v  = pa[attributeMapping[1]];   // dígito 1..5 en la posición “color”
    const hx = channelMap[v];
    if(hx) permOverride[ps] = hx;
  });
}

function rebuildPermOverrideUI(){
  const wrap = document.getElementById('permOverrideList');
  if(!wrap) return;

  wrap.innerHTML = '';

  const sel = document.getElementById('permutationList');
  const permStrs = sel ? Array.from(sel.selectedOptions).map(o=>o.value) : [];

  if(!permStrs.length){
    const empty = document.createElement('div');
    empty.style.opacity = '.7';
    empty.textContent = '(no permutations selected)';
    wrap.appendChild(empty);
    return;
  }

  permStrs.forEach((permStr, idx)=>{
    const autoHex = canonicalHexForPermStr(permStr);
    const ovHex   = permOverride[permStr] || null;
    const effHex  = (chromaMode === 'HABITATED' && ovHex) ? ovHex : autoHex;

    const row = document.createElement('div');
    row.className = 'permOverrideRow';

    const lab = document.createElement('div');
    lab.className = 'permOverrideLabel';
    lab.textContent = `Perm ${idx+1}: (${permStr})`;

    const controls = document.createElement('div');
    controls.className = 'permOverrideControls';

    const input = document.createElement('input');
    input.type = 'color';
    input.value = effHex;
    input.onchange = ()=> onPermColourPick(permStr, input.value);

    const btn = document.createElement('button');
    btn.textContent = 'Clear';
    btn.disabled = !permOverride[permStr];
    btn.style.opacity = btn.disabled ? '0.35' : '1';
    btn.onclick = ()=>{
      if(permOverride[permStr]){
        delete permOverride[permStr];
        if(!hasOverrides()) setChromaMode('CANONICAL');
        refreshAll({rebuild:false});
      }
    };

    controls.appendChild(input);
    controls.appendChild(btn);

    row.appendChild(lab);
    row.appendChild(controls);

    wrap.appendChild(row);
  });
}

const S_LEVELS = [...Array(12)].map((_,i)=>0.25 + 0.72*i/11); // 0.25 – 0.97
const V_LEVELS = [...Array(12)].map((_,i)=>0.20 + 0.75*i/11); // 0.20 – 0.95
const HSV_TOTAL   = H_STEPS * 12 * 12;                  // 20 736
const HSV_S_STRIDE = H_STEPS;                           // 144
const HSV_V_STRIDE = H_STEPS * 12;                      // 1 728

function idxToHSV(hIdx,sIdx,vIdx){
  const h = ((hIdx%H_STEPS)+H_STEPS) % H_STEPS;      // 0-143
  return {
    h: h * 360 / H_STEPS,                            // 0-359.5 °
    s: S_LEVELS[ ((sIdx%12)+12)%12 ],
    v: V_LEVELS[ ((vIdx%12)+12)%12 ]
  };
}

/* Normaliza cualquier hue a rango [0 … 360) */

/* HSV → RGB */
function hsvToRgb(h,s,v){
  h = ((h % 360) + 360) % 360;
  const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}
  else if(h<120){r=x;g=c;}
  else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}
  else if(h<300){r=x;b=c;}
  else {r=c;b=x;}
  return [(r+m)*255,(g+m)*255,(b+m)*255].map(v=>Math.round(v));
}

/* HSV struct → #rrggbb */
function hsvToHex({h,s,v}){
  const [r,g,b] = hsvToRgb(h,s,v);
  return '#'+new THREE.Color(r/255,g/255,b/255).getHexString();
}

/* RGB [0..255] → #rrggbb */
function rgbToHex(rgb){
  return '#'+new THREE.Color(rgb[0]/255, rgb[1]/255, rgb[2]/255).getHexString();
}

/* ────────── Hash core (32-bit, determinista) ────────── */

/* FNV-1a 32-bit (mezcla enteros) */
function fnv1a32(h, v){
  h ^= (v >>> 0);
  return Math.imul(h, 16777619) >>> 0;
}

/* Avalancha 32-bit (finalizer) */
function avalanche32(x){
  x ^= x >>> 16;
  x = Math.imul(x, 0x7feb352d) >>> 0;
  x ^= x >>> 15;
  x = Math.imul(x, 0x846ca68b) >>> 0;
  x ^= x >>> 16;
  return x >>> 0;
}

/* Proyección uniforme: u32 → (hIdx,sIdx,vIdx) en 144×12×12 */
function hsvIdxFromU32(u){
  const t = (u % HSV_TOTAL) >>> 0;
  const hIdx = t % H_STEPS;
  const sIdx = ((t / HSV_S_STRIDE) | 0) % 12;
  const vIdx = ((t / HSV_V_STRIDE) | 0) % 12;
  return [hIdx, sIdx, vIdx];
}

/* Llaves enteras fijas para el campo cromático único */
const CHROMA_KEYS = [0x243f6a88, 0x85a308d3, 0x13198a2e];

function getChromaKeys(){
  return CHROMA_KEYS;
}

/* Tags para separar dominios (glifo / fondo / paredes / palette) */
const TAG_GLYPH = 0x474c5946; // 'GLYF'
const TAG_BG    = 0x42475052; // 'BGPR'
const TAG_WALL  = 0x57414c4c; // 'WALL'

/* Hash canónico para una permutación (puede ser “escena actual” o “escena hipotética”) */
function hashPermutationCore(pa, sig, r, seedVal, sVal){
  const keys = getChromaKeys();

  let h = 0x811c9dc5;
  h = fnv1a32(h, seedVal | 0);
  h = fnv1a32(h, sVal    | 0);
  h = fnv1a32(h, keys[0]); h = fnv1a32(h, keys[1]); h = fnv1a32(h, keys[2]);
  h = fnv1a32(h, TAG_GLYPH);

  h = fnv1a32(h, r | 0);

  for(let i=0;i<5;i++) h = fnv1a32(h, pa[i] | 0);
  for(let i=0;i<5;i++) h = fnv1a32(h, sig[i] | 0);

  return avalanche32(h);
}


/* Hash canónico para color de escena (fondo / paredes) */
function hashSceneCore(sig, slot, seedVal, sVal, tag){
  const keys = getChromaKeys();

  let h = 0x811c9dc5;
  h = fnv1a32(h, seedVal | 0);
  h = fnv1a32(h, sVal    | 0);
  h = fnv1a32(h, keys[0]); h = fnv1a32(h, keys[1]); h = fnv1a32(h, keys[2]);
  h = fnv1a32(h, tag >>> 0);
  h = fnv1a32(h, slot | 0);
  for(let i=0;i<5;i++) h = fnv1a32(h, sig[i] | 0);
  return avalanche32(h);
}


/* API canónica: color del glifo */
function colorInfoForPermutation(pa, seedVal = sceneSeed, sVal = S_global){
  const r = lehmerRank(pa);
  const sig = computeSignature(pa);
  const u = hashPermutationCore(pa, sig, r, seedVal, sVal);
  const [hIdx, sIdx, vIdx] = hsvIdxFromU32(u);
  const hsv = idxToHSV(hIdx, sIdx, vIdx);
  const rgb = hsvToRgb(hsv.h, hsv.s, hsv.v);
  const hex = rgbToHex(rgb);
  return { r, sig, u, hIdx, sIdx, vIdx, hsv, rgb, hex };
}

function colorForPermutation(pa){
  return colorInfoForPermutation(pa).rgb;
}

/* API canónica: color “de canal” 1..5 (para el panel manual), derivado sólo de invariantes */


/* API canónica: HSV del fondo/paredes */
function hsvInfoForScene(tag, sig, slot, seedVal = sceneSeed, sVal = S_global){
  const u = hashSceneCore(sig, slot, seedVal, sVal, tag);
  const [hIdx, sIdx, vIdx] = hsvIdxFromU32(u);
  const hsv = idxToHSV(hIdx, sIdx, vIdx);
  const rgb = hsvToRgb(hsv.h, hsv.s, hsv.v);
  const hex = rgbToHex(rgb);
  return { u, hIdx, sIdx, vIdx, hsv, rgb, hex };
}

// 1)  f̂  de un glifo  →  promedio firma, llevada a [0-1]

    const minRangeValue = 2, maxRangeValue = 6;

    function getPermutations(arr){
      if(arr.length===1) return [arr];
      let res=[]; for(let i=0;i<arr.length;i++){
        const c=arr[i], rem=arr.slice(0,i).concat(arr.slice(i+1));
        for(const p of getPermutations(rem)) res.push([c].concat(p));
      }
      return res;
    }
    const allPermutations = getPermutations([1,2,3,4,5]);
    const permutationStrings = allPermutations.map(p=>p.join(','));

    // ════════════════════════════════════════════════════════════════
    //  Dear: Thoughts — régimen calendárico
    //
    //  Cada ciclo de 6 días, una escena fija. La fecha del primer
    //  día del ciclo es la semilla del sistema.
    //
    //  EPOCH = 16 de mayo de 2026 (compartida con Dear: Architectures).
    //
    //  Determinismo total: misma fecha → misma escena, siempre.
    //  El sistema permanece invariante en el tiempo.
    // ════════════════════════════════════════════════════════════════

    const EPOCH_THOUGHTS = new Date(2026, 4, 16); // mes 4 = mayo (0-indexed)
    const CYCLE_DAYS = 6;

    // Normaliza una fecha a medianoche local (sin horas).
    function dayOnly(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    // Días transcurridos desde EPOCH (entero).
    function daysSinceEpoch(date) {
      const ms = dayOnly(date).getTime() - dayOnly(EPOCH_THOUGHTS).getTime();
      return Math.floor(ms / 86400000);
    }

    // Devuelve la fecha del primer día del ciclo activo para `date`.
    // Si date está antes de EPOCH, devuelve EPOCH (no hay ciclos
    // negativos: la pieza empieza el 16 de mayo de 2026).
    function getCycleStartDate(date) {
      const d = daysSinceEpoch(date);
      if (d < 0) return new Date(EPOCH_THOUGHTS);
      const cycleIndex = Math.floor(d / CYCLE_DAYS);
      const start = new Date(EPOCH_THOUGHTS);
      start.setDate(start.getDate() + cycleIndex * CYCLE_DAYS);
      return start;
    }

    // Formato Kawara: MMM.DD.YYYY (e.g. "MAY.16.2026").
    const MONTH_ABBR = ["JAN","FEB","MAR","APR","MAY","JUN",
                        "JUL","AUG","SEP","OCT","NOV","DEC"];
    function formatKawara(date) {
      const m = MONTH_ABBR[date.getMonth()];
      const d = String(date.getDate()).padStart(2, "0");
      const y = date.getFullYear();
      return `${m}.${d}.${y}`;
    }

    // Semilla entera derivada de la fecha (estable, determinista).
    // Concatena AAAAMMDD y aplica FNV-1a + avalanche para mezclar.
    // hashString: FNV-1a 32-bit. IDÉNTICA a la de Poems/Words/Letters,
    // para que las cuatro piezas compartan literalmente la misma
    // semilla raíz para una fecha dada (misma nota fundamental).
    function hashString(str) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    // Cadena-semilla en el formato común del sistema: "MAY.16.2026"
    // (mes abreviado, día sin cero a la izquierda, año). Idéntico a
    // formatDateSeed de las otras piezas (MONTH_ABBR == MONTH_NAMES).
    function formatDateSeed(date) {
      const m = MONTH_ABBR[date.getMonth()];
      const d = date.getDate();
      const y = date.getFullYear();
      return m + "." + d + "." + y;
    }

    // Semilla raíz del ciclo. Ahora deriva EXACTAMENTE igual que las
    // demás piezas Dear: hashString(formatDateSeed(date)). Así, una
    // misma fecha produce la misma semilla raíz en las cuatro obras.
    function seedFromDate(date) {
      return hashString(formatDateSeed(date));
    }

    // Mulberry32: RNG determinista de 32 bits.
    // Devuelve una función que produce floats en [0, 1).
    function mulberry32(seed) {
      let a = seed >>> 0;
      return function() {
        a = (a + 0x6D2B79F5) >>> 0;
        let t = a;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // Selecciona N permutaciones (sin repetir) determinísticamente
    // desde un RNG sembrado. N se decide también con el RNG, en el
    // rango [1, 25] como en PRMTTN.
    function pickPermsForCycle(rng) {
      const n = 1 + Math.floor(rng() * 25);  // [1, 25]
      const indices = [];
      const used = new Set();
      while (indices.length < n) {
        const i = Math.floor(rng() * permutationStrings.length);
        if (!used.has(i)) {
          used.add(i);
          indices.push(i);
        }
      }
      return indices.map(i => permutationStrings[i].split(',').map(Number));
    }

    // Versión determinista de findCollisionFreeMapping: recorre los
    // 120 mappings en un orden barajado por la semilla del ciclo.
    // Esto evita que todos los ciclos prueben los mappings en el
    // mismo orden (lexicográfico), lo cual produciría sesgo.
    function findCollisionFreeMappingForCycle(perms, rng) {
      const candidateMappings = getAttributeMappings([0,1,2,3,4]).slice();

      // Fisher-Yates con el RNG sembrado: orden distinto por ciclo,
      // pero idéntico cada vez que se evalúa la misma fecha.
      for (let i = candidateMappings.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        const tmp = candidateMappings[i];
        candidateMappings[i] = candidateMappings[j];
        candidateMappings[j] = tmp;
      }

      for (const m of candidateMappings) {
        const cm = [m[0], m[1], m[2], m[3], m[4],
                    attributeMapping[5], attributeMapping[6]];
        const tg = buildTempGroup(perms, cm);
        if (!checkCollisionsInGroup(tg)) return cm;
      }
      return null;
    }

    // Genera la escena del ciclo correspondiente a `date`.
    // Determinista: misma fecha → misma escena, siempre.
    // No usa Math.random en ningún punto.
    function generateCycleScene(date) {
      const cycleStart = getCycleStartDate(date);
      const seed = seedFromDate(cycleStart);
      const rng = mulberry32(seed);

      // Intenta hasta encontrar un set sin colisiones. En la
      // práctica casi siempre acierta en el primer intento; si no,
      // re-pide con el mismo RNG (que sigue avanzando determinístico).
      let perms = null;
      let mapping = null;
      const MAX_TRIES = 200;
      for (let t = 0; t < MAX_TRIES; t++) {
        const tryPerms = pickPermsForCycle(rng);
        const tryMapping = findCollisionFreeMappingForCycle(tryPerms, rng);
        if (tryMapping) {
          perms = tryPerms;
          mapping = tryMapping;
          break;
        }
      }

      if (!perms || !mapping) {
        // Caso extremadamente raro: fallback determinista a un set
        // mínimo (una sola permutación, mapping identidad).
        perms = [[1,2,3,4,5]];
        mapping = [0,1,2,3,4, attributeMapping[5], attributeMapping[6]];
      }

      // Aplicar la selección al estado de la escena.
      const sel = document.getElementById('permutationList');
      Array.from(sel.options).forEach(o => o.selected = false);
      perms.forEach(p => {
        const val = p.join(',');
        const opt = sel.querySelector(`option[value="${val}"]`);
        if (opt) opt.selected = true;
      });

      attributeMapping = mapping;
      const attrSel = document.getElementById('attrMapping');
      if (attrSel) {
        attrSel.value = `${mapping[0]},${mapping[1]},${mapping[2]},${mapping[3]},${mapping[4]}`;
      }

      refreshAll({rebuild: true});

      // Actualizar HUD y document.title con la fecha del ciclo activo
      // (formato Kawara: MMM.DD.YYYY).
      const cycleLabel = formatKawara(cycleStart);
      const titleEl = document.getElementById('pieceTitle');
      if (titleEl) titleEl.textContent = "Dear: Thoughts — " + cycleLabel;
      document.title = "Dear: Thoughts — " + cycleLabel;

      return { cycleStart, seed, perms, mapping };
    }

    // ── Calendario (navegación de fechas) ──────────────────────────
    //
    //   Igual que las demás piezas Dear: el usuario puede viajar entre
    //   la fecha cero (EPOCH) y hoy. Ni antes (la obra no existía) ni

    function formatDateISO(date) {
      // Para el <input type="date">: yyyy-mm-dd
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function parseDateISO(s) {
      // Parsea yyyy-mm-dd como fecha local (no UTC).
      const parts = s.split("-");
      return new Date(parseInt(parts[0], 10),
                      parseInt(parts[1], 10) - 1,
                      parseInt(parts[2], 10));
    }

    function dateIsAfter(a, b) {
      const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      return A.getTime() > B.getTime();
    }

    function dateIsBefore(a, b) {
      const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      return A.getTime() < B.getTime();
    }

    function onDateChange() {
      const input = document.getElementById('dateInput');
      const v = input.value;
      if (!v) return;
      const chosen = parseDateISO(v);
      const today = new Date();
      if (dateIsAfter(chosen, today)) {
        input.value = formatDateISO(today);
        generateCycleScene(today);
        return;
      }
      if (dateIsBefore(chosen, EPOCH_THOUGHTS)) {
        input.value = formatDateISO(EPOCH_THOUGHTS);
        generateCycleScene(EPOCH_THOUGHTS);
        return;
      }
      generateCycleScene(chosen);
    }

    function goToToday() {

    function getAttributeMappings(a){
      if(a.length===1) return [a];
      let res=[]; for(let i=0;i<a.length;i++){

    function computeSignature(a){let s=[];for(let i=0;i<a.length;i++) s.push(a[i]+a[(i+1)%a.length]);return s;}
    function computeRange(sig){return Math.max(...sig)-Math.min(...sig);}

    const FACT=[1,1,2,6,24,120];
    let sceneSeed=0;
    function lehmerRank(p){
      let r=0;
      for(let i=0;i<p.length;i++){
        let c=0;
        for(let j=i+1;j<p.length;j++) if(p[j]<p[i]) c++;
        r+=c*FACT[p.length-1-i];
      }
      return r;
    }

    /* ========= NUEVO: sceneSeed orden‑invariante + dependiente del mapping ========= */

    /** Rank del mapping [m0..m4] usando Lehmer rank sobre [m_i+1] (1..5) */
    function mappingRank(m){
      const arr = [m[0]+1, m[1]+1, m[2]+1, m[3]+1, m[4]+1];
      return lehmerRank(arr);
    }

    /** sceneSeed = (37·sumR + 101·sumR2 + 53·mRank) mod 360  (orden‑invariante) */
    function computeSceneSeedFrom(perms, m){
      let sumR = 0, sumR2 = 0;
      perms.forEach(pa=>{
        const r = lehmerRank(pa);
        sumR  += r;
        sumR2 += r*r;
      });
      const mRank = mappingRank(m);
      return (37*sumR + 101*sumR2 + 53*mRank) % 360;
    }
    /** S = ( Σ (P_{mx}+P_{my}+P_{mz}) ) mod 125  — se mantiene para el sistema cromático */
    function computeGlobalS(perms, m){
      const mx = m[2], my = m[3], mz = m[4];
      let S = 0;
      perms.forEach(p=>{
        S += p[mx] + p[my] + p[mz];
      });
      return S % 125;
    }

    /** Desplazamiento global único para posiciones */
    function computeGlobalShift(perms, m){
      let sumR = 0;
      perms.forEach(p=>{
        sumR += lehmerRank(p);
      });
      return (sumR + mappingRank(m)) % 125;
    }

    function getShiftRankCellInfo(p){
      const r = lehmerRank(p);
      const I = (r + globalShift) % 125;

      const xIndex = Math.floor(I / 25);
      const yIndex = Math.floor((I % 25) / 5);
      const zIndex = I % 5;

      const step = cubeSize / 5;
      const X = (xIndex - 2) * step;
      const Y = (yIndex - 2) * step;
      const Z = (zIndex - 2) * step;

      return {
        r,
        I,
        xIndex,
        yIndex,
        zIndex,
        xHuman: xIndex + 1,
        yHuman: yIndex + 1,
        zHuman: zIndex + 1,
        X,
        Y,
        Z
      };
    }

    function createPermutationObjectWithMapping(pa,map){
  const fv = pa[map[0]];
  const d  = shapeMapping[fv];
  const w  = d.w, h = d.h, t = 0.5;

  // Color canónico (hash → HSV lattice → RGB)
  const rgb = colorForPermutation(pa);

  // Posición discreta real: centro de una de las 125 celdas
  const cell = getShiftRankCellInfo(pa);

  // Material: el hex/rgb viene en sRGB (albedo). Convertimos a lineal antes de renderizar.
  const mat = new THREE.MeshLambertMaterial({
    color: new THREE.Color(rgb[0]/255, rgb[1]/255, rgb[2]/255).convertSRGBToLinear(),
    dithering: true
  });

  const geo  = new THREE.BoxGeometry(w,h,t);
  const mesh = new THREE.Mesh(geo, mat);

  mesh.position.set(
    clamp(cell.X,-halfCube+w/2,halfCube-w/2),
    clamp(cell.Y,-halfCube+h/2,halfCube-h/2),
    clamp(cell.Z,-halfCube+t/2,halfCube-t/2)
  );

  const sig = computeSignature(pa);
  const rg  = computeRange(sig);

  mesh.userData = {
    permStr: pa.join(','),
    signature: sig,
    range: rg,
    rotationSpeed: mapRangeToSpeed(rg, minRangeValue, maxRangeValue),

    lehmerRank: cell.r,
    shiftIndex: cell.I,

    cellIndexX: cell.xIndex,
    cellIndexY: cell.yIndex,
    cellIndexZ: cell.zIndex,

    cellHumanX: cell.xHuman,
    cellHumanY: cell.yHuman,
    cellHumanZ: cell.zHuman,

    centerX: cell.X,
    centerY: cell.Y,
    centerZ: cell.Z
  };

  return mesh;
}
    function createPermutationObject(pa){ return createPermutationObjectWithMapping(pa,attributeMapping); }

    function checkCollisionsInGroup(g){
      for(let i=0;i<g.children.length;i++){
        const b1=new THREE.Box3().setFromObject(g.children[i]);
        for(let j=i+1;j<g.children.length;j++){
          const b2=new THREE.Box3().setFromObject(g.children[j]);
          if(b1.intersectsBox(b2)) return true;
        }

 * Las 120 reorganizaciones de atributos [forma,color,x,y,z] son los

 * las permutaciones del ciclo) permanece invariante; lo que cambia es
 * cómo ese genotipo se manifiesta: qué dígito gobierna la forma, cuál
 * el color, cuáles las posiciones. Ciento veinte formas distintas de

 * El botón "120" recorre estos fenotipos uno a uno. No cambia las
 * permutaciones del día (eso lo fija la fecha): cambia su lectura.

    /* ============================================================
     *  buildTempGroup: construye un grupo temporal con un mapping
     *  dado, sin tocar la escena real. Lo usa

    /** Construye un grupo temporal con un mapping dado, sin tocar la escena real */
function buildTempGroup(perms, mapping){
  const tg = new THREE.Group();

  // Guardamos estado global
  const prevSeed  = sceneSeed;
  const prevS     = S_global;
  const prevShift = globalShift;
  const prevMap   = attributeMapping.slice();

  // Calculamos los nuevos valores teóricos
  const tmpSeed  = computeSceneSeedFrom(perms, mapping);
  const tmpS     = computeGlobalS(perms, mapping);
  const tmpShift = computeGlobalShift(perms, mapping);

  // Seteamos temporalmente los globales para que createPermutationObjectWithMapping
  // use exactamente la misma lógica que la escena final
  sceneSeed        = tmpSeed;
  S_global         = tmpS;
  globalShift      = tmpShift;
  attributeMapping = mapping;

  perms.forEach(pa=>{
    const mesh = createPermutationObjectWithMapping(pa, mapping);
    tg.add(mesh);
  });

  // Restauramos
  sceneSeed        = prevSeed;
  S_global         = prevS;
  globalShift      = prevShift;
  attributeMapping = prevMap;

  return tg;
}


function updateScene(attemptResolve=true){
  // Limpia grupo
  while(permutationGroup.children.length>0){
    const o=permutationGroup.children[0];
    permutationGroup.remove(o);
    o.geometry.dispose(); o.material.dispose();
  }

  // Permutaciones activas
  const opts  = Array.from(document.getElementById('permutationList').selectedOptions);
  const perms = opts.map(o => o.value.split(',').map(Number));

  // Invariantes de escena
  sceneSeed   = computeSceneSeedFrom(perms, attributeMapping); // croma
  S_global    = computeGlobalS(perms, attributeMapping);       // croma
  globalShift = computeGlobalShift(perms, attributeMapping);   // posición

  // Construye objetos
  perms.forEach(pa=>{
    const obj = createPermutationObject(pa);
    permutationGroup.add(obj);
  });
}

function saveImage(){
  const A2_W = 7016, A2_H = 4961;

  const prevPixelRatio = renderer.getPixelRatio();
  const prevSize       = renderer.getSize(new THREE.Vector2());
  const prevAspect     = camera.aspect;
  const prevRt         = renderer.getRenderTarget?.() || null;
  const prevBg         = scene.background ? scene.background.clone() : null;

  const screenAspect = prevSize.x / prevSize.y;

  // Render con el MISMO aspect que se ve en pantalla
  let renderW, renderH;
  const a2Aspect = A2_W / A2_H;
  if (screenAspect > a2Aspect) {
    renderW = A2_W;
    renderH = Math.round(A2_W / screenAspect);
  } else {
    renderH = A2_H;
    renderW = Math.round(A2_H * screenAspect);
  }

  renderer.setPixelRatio(1);
  renderer.setSize(renderW, renderH, false);
  camera.aspect = screenAspect;
  camera.updateProjectionMatrix();

  const rt = new THREE.WebGLRenderTarget(renderW, renderH, { depthBuffer:true, stencilBuffer:false });
  rt.texture.encoding = THREE.sRGBEncoding; // IMPORTANT: igualar salida a pantalla

  const clearHex = __bgHexSRGB || '#ffffff';     // para el canvas (sRGB)
  renderer.setClearColor(prevBg || new THREE.Color(clearHex).convertSRGBToLinear(), 1); // para WebGL (lineal)
  renderer.setRenderTarget(rt);
  renderer.clear(true, true, true);
  renderer.render(scene, camera);

  const pixels = new Uint8Array(renderW * renderH * 4);
  renderer.readRenderTargetPixels(rt, 0, 0, renderW, renderH, pixels);

  const tmp = document.createElement('canvas');
  tmp.width = renderW; tmp.height = renderH;
  const tctx = tmp.getContext('2d');
  const imgData = tctx.createImageData(renderW, renderH);
  const row = renderW * 4;
  for (let y = 0; y < renderH; y++) {
    const src = (renderH - 1 - y) * row;
    const dst = y * row;
    imgData.data.set(pixels.subarray(src, src + row), dst);
  }
  tctx.putImageData(imgData, 0, 0);

  const final = document.createElement('canvas');
  final.width = A2_W; final.height = A2_H;
  const fctx = final.getContext('2d');

  fctx.fillStyle = clearHex;
  fctx.fillRect(0, 0, A2_W, A2_H);
  const offX = Math.floor((A2_W - renderW) / 2);
  const offY = Math.floor((A2_H - renderH) / 2);
  fctx.drawImage(tmp, offX, offY);

  final.toBlob((blob)=>{
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'PRMTTN_A2.png';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }, 'image/png');

  renderer.setRenderTarget(prevRt);
  rt.dispose();
  renderer.setPixelRatio(prevPixelRatio);
  renderer.setSize(prevSize.x, prevSize.y);
  camera.aspect = prevAspect;
  camera.updateProjectionMatrix();
  if (prevBg) scene.background = prevBg;
  controls.update();
}

    shape.lineTo( half,  half); shape.lineTo(-half,  half);

        right.geometry.dispose();  right.geometry  = new THREE.BoxGeometry(t2, o, t2);
        top.geometry.dispose();    top.geometry    = new THREE.BoxGeometry(o, t2, t2);
        bottom.geometry.dispose(); bottom.geometry = new THREE.BoxGeometry(o, t2, t2);

        left.position.set( -h22 - t2*0.5, 0, zc2);
        right.position.set(  h22 + t2*0.5, 0, zc2);
        top.position.set(0,  h22 + t2*0.5, zc2);
        bottom.position.set(0,-h22 - t2*0.5, zc2);
      },
      setThickness(t2){
        this.params.thickness = t2;
        const o  = this.params.open;
        const zc2 = -this.params.distance - t2*0.5;
        const h22 = o * 0.5;

        const gFrame = makeFrameGeometry(this.params.outer, o, t2);
        this.frame.geometry.dispose(); this.frame.geometry = gFrame;

        left.geometry.dispose();   left.geometry   = new THREE.BoxGeometry(t2, o, t2);
        right.geometry.dispose();  right.geometry  = new THREE.BoxGeometry(t2, o, t2);
        top.geometry.dispose();    top.geometry    = new THREE.BoxGeometry(o, t2, t2);
        bottom.geometry.dispose(); bottom.geometry = new THREE.BoxGeometry(o, t2, t2);

        left.position.set( -h22 - t2*0.5, 0, zc2);
        right.position.set(  h22 + t2*0.5, 0, zc2);
        top.position.set(0,  h22 + t2*0.5, zc2);
        bottom.position.set(0,-h22 - t2*0.5, zc2);
      }
    };
  }

  const wall = createWall({open:100, outer:600, thickness:15, distance:93});
  wall.setVisible(frontWallVisible);

  (function tick(){
    try{
      wall.rig.position.copy(camera.position);
      wall.rig.quaternion.copy(camera.quaternion);
      wall.rig.updateMatrix(); wall.rig.updateMatrixWorld(true);
    }catch(_){ }
    requestAnimationFrame(tick);
  })();

  window.WW = {
    get(){ return wall; },
    setDistance(d){ wall.setDistance(d); },
    setOuter(o){ wall.setOuter(o); },
    setOpen(o){ wall.setOpen(o); },
    setThickness(t){ wall.setThickness(t); },
    activeInfo(){
      const d = wall.params.distance, t = wall.params.thickness;
      const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).normalize();
      const backCenter = camera.position.clone().add(dir.clone().multiplyScalar(-(d+t)));
      return { dir, backCenter, distance:d, thickness:t };
    }
  };

  window.WW_applyFor = function(){ wall.setVisible(frontWallVisible); };
})();
;

</script>
