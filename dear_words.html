    const WORDS = WORDS_RAW.split(" ");

    // ── Constantes del sistema ─────────────────────────────────────
    const GRID = 5;
    const EPOCH = new Date(2026, 4, 16);     // 16 mayo 2026
    const CYCLE_DAYS = 5;

    /* ═══════════ EL RELOJ DE DEAR: (módulo canónico, autocontenido) ═══════════
       Esta obra ya no lee el calendario del mundo: lee el reloj (Dear: Time).
       Big Bang: 22 jun 2026 00:00 — la Gran Conjunción (todas las manecillas en 1).
       La obra tiene un GENOMA: la permutación nacida de su título por el motor
       canónico. Es llamada (engendra una pieza) cada vez que las 4 manecillas
       lentas del reloj entran al estado exacto de su genoma (época fina); N1,
       el segundero, deletrea el genoma completo dentro de cada época.
       Piezas prenatales (n ≤ 0): el reloj proléptico — la última temporada
       anterior al Big Bang, navegable; ceden el lugar cuando llega la vida.
       Semilla de la pieza n: hash(genoma + '#' + n). Fertilidad: la escalera
       Φ = 1 + ((L + n) mod 24), continua a través del nacimiento. */
    const CLK = (function(){
      const BIRTH_MS = new Date(2026, 5, 22, 0, 0, 0, 0).getTime();
      const TITLE = "Dear: Words";
      function chash(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
      function crng(seed){ let a=seed>>>0; return function(){ a=(a+0x6D2B79F5)>>>0; let t=a; t=Math.imul(t^(t>>>15),t|1); t^=t+Math.imul(t^(t>>>7),t|61); return ((t^(t>>>14))>>>0)/4294967296; }; }
      function cperms(arr){ if(arr.length<=1) return [arr]; const out=[]; for(let i=0;i<arr.length;i++){ const c=arr[i], rest=arr.slice(0,i).concat(arr.slice(i+1)); for(const p of cperms(rest)) out.push([c].concat(p)); } return out; }
      const P120 = cperms([1,2,3,4,5]);
      function clehmer(p){ const F=[1,1,2,6,24,120]; let r=0; for(let i=0;i<p.length;i++){ let c=0; for(let j=i+1;j<p.length;j++) if(p[j]<p[i]) c++; r+=c*F[p.length-1-i]; } return r; }
      function firstPerm(seedStr){ const g=crng(chash(seedStr)); return P120[Math.floor(g()*120)]; }
      // Manecillas natales de Time (idéntico a dear_time: seed "JUN.22.2026")
      const natal = (function(){ const g=crng(chash("JUN.22.2026")); const idx=[], u=new Set();
        while(idx.length<5){ const i=Math.floor(g()*120); if(!u.has(i)){ u.add(i); idx.push(i);} }
        return idx.map(i=>{ const p=P120[i]; return Math.pow(2,(119-clehmer(p))/5); }); })();
      // Períodos en segundos de N2..N5 (las 4 lentas; natal[0] es N1, el segundero)
      const PER = [natal[1], natal[2], natal[3], natal[4]];
      const GENOME = firstPerm(TITLE);
      const L = clehmer(GENOME);
      const TGT = [GENOME[1], GENOME[2], GENOME[3], GENOME[4]];
      function hand(t, per){ const s=Math.floor(t/per); return ((s%5)+5)%5+1; }
      // Épocas propias: aperturas del estado (N2..N5) = genoma, desde el inicio
      // de la temporada prenatal de la obra hasta ahora.
      const P_N3 = PER[1];
      const backT = -(6 - GENOME[2]) * P_N3;         // inicio del preestreno (s)
      function computeTimes(){
        const nowT = (Date.now() - BIRTH_MS)/1000;
        const evts = [backT];
        for(const per of PER){
          let t = Math.ceil(backT/per)*per;
          if(t<=backT) t+=per;
          for(; t<=nowT; t+=per) evts.push(t);
        }
        evts.sort(function(a,b){return a-b;});
        const times=[]; let inState=false;
        for(let i=0;i<evts.length;i++){
          const t=evts[i]+1e-3;
          const ok = hand(t,PER[0])===TGT[0] && hand(t,PER[1])===TGT[1] &&
                     hand(t,PER[2])===TGT[2] && hand(t,PER[3])===TGT[3];
          if(ok && !inState) times.push(BIRTH_MS + evts[i]*1000);
          inState = ok;
        }
        return times;
      }
      const times = computeTimes();
      let preCount = 0; for(const t of times) if(t < BIRTH_MS) preCount++;
      function ord(i){ return i - preCount + 1; }
      function phi(i){ return 1 + ((((L + ord(i)) % 24) + 24) % 24); }
      function seedStr(i){ return GENOME.join(',') + '#' + ord(i); }
      function idxAt(ms){
        if(!times.length) return 0;
        let lo=0, hi=times.length-1, ans=0;
        if(ms < times[0]) return 0;
        while(lo<=hi){ const m=(lo+hi)>>1; if(times[m]<=ms){ ans=m; lo=m+1; } else hi=m-1; }
        return ans;
      }
      return { times:times, count:times.length, preCount:preCount,
               GENOME:GENOME, L:L, ord:ord, phi:phi, seedStr:seedStr, idxAt:idxAt,
               BIRTH_MS:BIRTH_MS };
    })();

    const MAX_WORDS_PER_CYCLE = 25;

    const MONTH_NAMES = [
      "JAN", "FEB", "MAR", "APR", "MAY", "JUN",
      "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"

    // ── Utilidades de hash y RNG ───────────────────────────────────
    function hashString(s) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function() {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ── Orden global del diccionario ───────────────────────────────
    //
    //   Una vez al iniciar el proyecto, las 10.000 palabras se
    //   barajan determinísticamente con la fecha cero como semilla.
    //   Este orden es definitivo y verificable: cualquiera con el
    //   código puede regenerar exactamente esta lista.
    function shuffleDictionary() {
      const rng = mulberry32(hashString("EPOCH:" + formatDateSeed(EPOCH)));
      const arr = WORDS.slice();
      // Fisher-Yates determinista
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
      return arr;
    }
    let DICT_ORDERED = null;  // se inicializa en init()

    // ── Fechas ─────────────────────────────────────────────────────
    function formatDateSeed(date) {
      const m = MONTH_NAMES[date.getMonth()];
      const d = date.getDate();
      const y = date.getFullYear();
      return m + "." + d + "." + y;
    }

    function formatDateISO(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function parseDateISO(s) {
      const parts = s.split("-");
      return new Date(parseInt(parts[0], 10),
                      parseInt(parts[1], 10) - 1,
                      parseInt(parts[2], 10));
    }

    function dayDiff(a, b) {
      // Días entre fechas (a - b), ignorando hora.
      const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      const ms = A.getTime() - B.getTime();
      return Math.round(ms / 86400000);
    }

    function dateIsAfter(a, b) {
      return dayDiff(a, b) > 0;
    }

    function dateIsBefore(a, b) {
      return dayDiff(a, b) < 0;
    }

    // ── Régimen de ciclos ──────────────────────────────────────────
    //
    //   Ciclo K = días [EPOCH + K*5, EPOCH + (K+1)*5 - 1].
    //   La fecha-semilla del ciclo K es EPOCH + K*5 días.
    function cycleNumberOf(date) {
      // El reloj decide: índice de la época vigente en esa fecha.
      return CLK.idxAt(date.getTime());
    }

    function cycleStartDate(k) {
      const i = Math.max(0, Math.min(k, CLK.count - 1));
      return new Date(CLK.times[i]);
    }

    function cycleSeedString(k) {
      return CLK.seedStr(k);   // genoma + '#' + ordinal (el calendario ha muerto)
    }

    // ── Regla canónica de fertilidad (Q3) ──────────────────────────
    //
    //   Cuántas permutaciones engendra una fecha. Universal a las cinco
    //   obras de Dear:. Nace de la fecha misma (no de un oráculo):
    //
    //     fertilidad = 1 + ( [ rdig(día)·rdig(mes)·rdig(sumaCifrasAño)
    //                          + día + mes ] mod 24 )
    //
    //   rdig = raíz digital (reducir a un dígito sumando cifras).
    function rdig(n) { n = Math.abs(n); if (n === 0) return 0; const r = n % 9; return r === 0 ? 9 : r; }
    function sumaCifrasAnio(y) { return String(y).split('').reduce((a, b) => a + (+b), 0); }
    function fertility(date) {
      const dia = date.getDate(), mes = date.getMonth() + 1;
      const sY = sumaCifrasAnio(date.getFullYear());
      const k = rdig(dia) * rdig(mes) * rdig(sY) + dia + mes;
      return 1 + (((k % 24) + 24) % 24);
    }

    // ── Cuenta acumulada de palabras hasta el ciclo K (excluyente) ─
    //
    //   Para determinar qué palabras ocupan el ciclo K, necesitamos
    //   el offset = N(0) + N(1) + ... + N(K-1).
    //   Cacheamos para evitar recálculo.
    const offsetCache = { 0: 0 };  // offset al inicio del ciclo 0 = 0
    const sizeCache = {};

    function wordsCountForCycle(k) {
      if (sizeCache[k] !== undefined) return sizeCache[k];
      // N palabras = fertilidad canónica (Q3) del primer día del ciclo.
      const n = CLK.phi(k);   // la escalera: 1 + ((L + n) mod 24)
      sizeCache[k] = n;
      return n;
    }

    function offsetForCycle(k) {
      if (offsetCache[k] !== undefined) return offsetCache[k];
      // Calcular acumulado desde el último cache conocido
      let lastKnown = k - 1;
      while (lastKnown >= 0 && offsetCache[lastKnown] === undefined) lastKnown--;
      let acc = offsetCache[lastKnown];
      for (let j = lastKnown; j < k; j++) {
        acc += wordsCountForCycle(j);
        offsetCache[j + 1] = acc;
      }
      return offsetCache[k];
    }

    function wordsForCycle(k) {
      const n = wordsCountForCycle(k);
      const offset = offsetForCycle(k);
      // Si excedemos el diccionario, recortamos (final del proyecto).
      const end = Math.min(offset + n, DICT_ORDERED.length);
      return DICT_ORDERED.slice(offset, end);
    }

    // ── Posiciones libres con búsqueda de no-solapamiento ──────────
    //
    //   Cada palabra recibe una posición (x, y) en coordenadas

    //   se solapan, una se desplaza determinísticamente (variando
    //   el sub-índice) hasta encontrar separación adecuada.
    //
    //   El ancho real de cada palabra se mide DESPUÉS de renderizarla
    //   en el SVG mediante getBBox(), no por estimación. Esto evita
    //   los errores de estimación que producen colisiones visuales.
    //
    //   Las palabras NO se atan a una grilla visible: flotan en
    //   posiciones reales dentro del rectángulo del cerramiento.
    function placeWordsInField(cycleSeed, words, fieldBox, fontPx) {
      const fieldW = fieldBox.x1 - fieldBox.x0;
      const fieldH = fieldBox.y1 - fieldBox.y0;

      // Margen interior para que las palabras no toquen los muros.
      const innerMargin = Math.min(fieldW, fieldH) * 0.06;
      const innerX0 = fieldBox.x0 + innerMargin;
      const innerY0 = fieldBox.y0 + innerMargin;
      const innerX1 = fieldBox.x1 - innerMargin;
      const innerY1 = fieldBox.y1 - innerMargin;

      // Separación mínima entre palabras (escala con la tipografía).
      const padding = fontPx * 0.45;

      function boxesOverlap(a, b, pad) {
        return !(a.x1 + pad < b.x0 || b.x1 + pad < a.x0 ||
                 a.y1 + pad < b.y0 || b.y1 + pad < a.y0);
      }

      // Pre-medimos el ancho real de cada palabra renderizándola
      // momentáneamente y consultando getBBox().
      function measureWord(word) {
        const t = document.createElementNS(ns, "text");
        t.setAttribute("x", 0);
        t.setAttribute("y", 0);
        t.setAttribute("text-anchor", "middle");
        t.setAttribute("dominant-baseline", "middle");
        t.setAttribute("fill", "#000000");
        t.setAttribute("font-family", "Futura, 'Futura PT', 'Century Gothic', 'Avenir Next', Avenir, sans-serif");
        t.setAttribute("font-weight", "700");
        t.setAttribute("font-size", fontPx);
        t.setAttribute("letter-spacing", "0.06em");
        t.textContent = word.toUpperCase();
        svgEl.appendChild(t);
        const bb = t.getBBox();
        svgEl.removeChild(t);
        // Devolvemos ancho y alto reales, con un pequeño colchón
        // para compensar el redondeo subpíxel del navegador.
        return { w: bb.width + fontPx * 0.10, h: bb.height + fontPx * 0.10 };
      }

      // Caja a partir de centro + dimensiones medidas.
      function wordBox(cx, cy, w, h) {
        return { x0: cx - w/2, y0: cy - h/2, x1: cx + w/2, y1: cy + h/2 };
      }

      // Medir todas las palabras de una vez (con la tipografía cargada).
      const measures = words.map(measureWord);

      const placed = [];
      const MAX_ATTEMPTS = 800;

      for (let i = 0; i < words.length; i++) {
        const word = words[i];
        const { w, h } = measures[i];

        let attempt = 0;
        let placedOK = false;

        while (attempt < MAX_ATTEMPTS && !placedOK) {
          const subSeed = cycleSeed + ":" + i + ":" + attempt;
          const rng = mulberry32(hashString(subSeed));

          // Posición central dentro del campo, respetando que la caja
          // entera quepa con su mitad.
          const minCx = innerX0 + w/2;
          const maxCx = innerX1 - w/2;
          const minCy = innerY0 + h/2;
          const maxCy = innerY1 - h/2;

          // Si la palabra es más ancha que el campo, la ponemos en el centro.
          let cx, cy;
          if (maxCx < minCx) cx = (innerX0 + innerX1) / 2;
          else cx = minCx + rng() * (maxCx - minCx);
          if (maxCy < minCy) cy = (innerY0 + innerY1) / 2;
          else cy = minCy + rng() * (maxCy - minCy);

          const box = wordBox(cx, cy, w, h);

          let collides = false;
          for (let j = 0; j < placed.length; j++) {
            if (boxesOverlap(box, placed[j].box, padding)) {
              collides = true; break;
            }
          }

          if (!collides) {
            placed.push({ word, cx, cy, box, fontPx });
            placedOK = true;
          }
          attempt++;
        }

        // Si tras MAX_ATTEMPTS no se logra sin colisión, intentamos
        // una segunda fase reduciendo el padding progresivamente.
        if (!placedOK) {
          for (let relax = 0.7; relax >= 0.0 && !placedOK; relax -= 0.1) {
            const padRelaxed = padding * relax;
            for (let a = 0; a < 200 && !placedOK; a++) {
              const subSeed = cycleSeed + ":" + i + ":relax:" + relax.toFixed(1) + ":" + a;
              const rng = mulberry32(hashString(subSeed));
              const minCx = innerX0 + w/2, maxCx = innerX1 - w/2;
              const minCy = innerY0 + h/2, maxCy = innerY1 - h/2;
              let cx = (maxCx < minCx) ? (innerX0 + innerX1)/2 : minCx + rng()*(maxCx-minCx);
              let cy = (maxCy < minCy) ? (innerY0 + innerY1)/2 : minCy + rng()*(maxCy-minCy);
              const box = wordBox(cx, cy, w, h);
              let collides = false;
              for (let j = 0; j < placed.length; j++) {
                if (boxesOverlap(box, placed[j].box, padRelaxed)) {
                  collides = true; break;
                }
              }
              if (!collides) {
                placed.push({ word, cx, cy, box, fontPx });
                placedOK = true;
              }
            }
          }
        }

        // Fallback final (no debería alcanzarse): posición central forzada.
        if (!placedOK) {
          const cx = (innerX0 + innerX1) / 2;
          const cy = (innerY0 + innerY1) / 2;
          placed.push({ word, cx, cy, box: wordBox(cx, cy, w, h), fontPx });
        }
      }
      return placed;
    }

    // ── Posición de las aperturas (dos cortes) ─────────────────────
    //
    //   Dos aperturas por ciclo, en dos paredes distintas. Las paredes
    //   elegidas y las posiciones sobre ellas derivan determinística-
    //   mente de la semilla del ciclo.
    //
    //   Dos aperturas eliminan la lectura de cuello de botella que
    //   produce una sola: el cerramiento no fuerza un solo paso. Las
    //   palabras no están atrapadas en un recinto con una única salida
    //   sino que residen en un campo permeable. La arquitectura sigue
    //   siendo parcial: dos paredes se "abren", dos se mantienen ente-
    //   ras. Cada ciclo cambia qué dos paredes son y dónde se abren.
    //
    //   Las paredes rotan pseudoaleatoriamente (no en orden fijo) y
    //   son siempre distintas entre sí. Las posiciones sobre cada
    //   pared varían continuas en t ∈ [0.20, 0.80] para que no toquen
    //   las esquinas.
    function openingsForCycle(cycleSeed, fieldBox) {
      const fieldW = fieldBox.x1 - fieldBox.x0;
      const fieldH = fieldBox.y1 - fieldBox.y0;
      const openSize = Math.min(fieldW, fieldH) * 0.10;

      // Elegir la primera pared determinísticamente: 0=top, 1=right, 2=bottom, 3=left.
      const wallRng1 = mulberry32(hashString("wall1:" + cycleSeed));
      const wallIdx1 = Math.floor(wallRng1() * 4);

      // Elegir la segunda pared, distinta de la primera.
      // Rango efectivo 0-2; si coincide con wallIdx1, se desplaza al siguiente.
      const wallRng2 = mulberry32(hashString("wall2:" + cycleSeed));
      let wallIdx2 = Math.floor(wallRng2() * 3);
      if (wallIdx2 >= wallIdx1) wallIdx2 += 1;

      // Posiciones sobre cada pared, t ∈ [0.20, 0.80].
      const posRng1 = mulberry32(hashString("pos1:" + cycleSeed));
      const t1 = 0.20 + posRng1() * 0.60;
      const posRng2 = mulberry32(hashString("pos2:" + cycleSeed));
      const t2 = 0.20 + posRng2() * 0.60;

      // Inicializar las cuatro paredes como cerradas.
      const openings = { size: openSize, top: null, right: null, bottom: null, left: null };

      // Helper: asignar una apertura a una pared
      function placeOpening(wallIdx, t) {
        if (wallIdx === 0) {
          openings.top    = { x: fieldBox.x0 + t * fieldW, y: fieldBox.y0 };
        } else if (wallIdx === 1) {
          openings.right  = { x: fieldBox.x1,              y: fieldBox.y0 + t * fieldH };
        } else if (wallIdx === 2) {
          openings.bottom = { x: fieldBox.x0 + t * fieldW, y: fieldBox.y1 };
        } else {
          openings.left   = { x: fieldBox.x0,              y: fieldBox.y0 + t * fieldH };
        }
      }

      placeOpening(wallIdx1, t1);
      placeOpening(wallIdx2, t2);

      return openings;
    }

    // ── Dibujo SVG ─────────────────────────────────────────────────
    const svgEl = document.getElementById("plan");
    const ns = "http://www.w3.org/2000/svg";

    function drawField(cycleK) {
      // Limpiar
      while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

      const W = 1600, H = 1600;
      // El cuadrado ocupa el centro con margen.
      const margin = 200;
      const side = W - 2 * margin;
      const fieldBox = {
        x0: margin, y0: margin,
        x1: margin + side, y1: margin + side
      };

      const wallThickness = side * 0.027;   // 3× más gruesos
      const cycleSeed = cycleSeedString(cycleK);
      const openings = openingsForCycle(cycleSeed, fieldBox);
      const openHalf = openings.size / 2;

      // Dibujar muros. La pared con apertura se dibuja como dos
      // segmentos partidos por el corte; las otras tres se dibujan
      // enteras, sin corte.
      function drawHorizontalWallFull(y) {
        const l = document.createElementNS(ns, "line");
        l.setAttribute("x1", fieldBox.x0);
        l.setAttribute("y1", y);
        l.setAttribute("x2", fieldBox.x1);
        l.setAttribute("y2", y);
        l.setAttribute("stroke", "#000000");
        l.setAttribute("stroke-width", wallThickness);
        l.setAttribute("stroke-linecap", "square");
        svgEl.appendChild(l);
      }
      function drawVerticalWallFull(x) {
        const l = document.createElementNS(ns, "line");
        l.setAttribute("x1", x);
        l.setAttribute("y1", fieldBox.y0);
        l.setAttribute("x2", x);
        l.setAttribute("y2", fieldBox.y1);
        l.setAttribute("stroke", "#000000");
        l.setAttribute("stroke-width", wallThickness);
        l.setAttribute("stroke-linecap", "square");
        svgEl.appendChild(l);
      }
      function drawHorizontalWallBroken(y, breakX) {
        const l1 = document.createElementNS(ns, "line");
        l1.setAttribute("x1", fieldBox.x0);
        l1.setAttribute("y1", y);
        l1.setAttribute("x2", breakX - openHalf);
        l1.setAttribute("y2", y);
        l1.setAttribute("stroke", "#000000");
        l1.setAttribute("stroke-width", wallThickness);
        l1.setAttribute("stroke-linecap", "square");
        svgEl.appendChild(l1);
        const l2 = document.createElementNS(ns, "line");
        l2.setAttribute("x1", breakX + openHalf);
        l2.setAttribute("y1", y);
        l2.setAttribute("x2", fieldBox.x1);
        l2.setAttribute("y2", y);
        l2.setAttribute("stroke", "#000000");
        l2.setAttribute("stroke-width", wallThickness);
        l2.setAttribute("stroke-linecap", "square");
        svgEl.appendChild(l2);
      }
      function drawVerticalWallBroken(x, breakY) {
        const l1 = document.createElementNS(ns, "line");
        l1.setAttribute("x1", x);
        l1.setAttribute("y1", fieldBox.y0);
        l1.setAttribute("x2", x);
        l1.setAttribute("y2", breakY - openHalf);
        l1.setAttribute("stroke", "#000000");
        l1.setAttribute("stroke-width", wallThickness);
        l1.setAttribute("stroke-linecap", "square");
        svgEl.appendChild(l1);
        const l2 = document.createElementNS(ns, "line");
        l2.setAttribute("x1", x);
        l2.setAttribute("y1", breakY + openHalf);
        l2.setAttribute("x2", x);
        l2.setAttribute("y2", fieldBox.y1);
        l2.setAttribute("stroke", "#000000");
        l2.setAttribute("stroke-width", wallThickness);
        l2.setAttribute("stroke-linecap", "square");
        svgEl.appendChild(l2);
      }

      // Top
      if (openings.top) drawHorizontalWallBroken(fieldBox.y0, openings.top.x);
      else              drawHorizontalWallFull(fieldBox.y0);
      // Bottom
      if (openings.bottom) drawHorizontalWallBroken(fieldBox.y1, openings.bottom.x);
      else                 drawHorizontalWallFull(fieldBox.y1);
      // Left
      if (openings.left) drawVerticalWallBroken(fieldBox.x0, openings.left.y);
      else               drawVerticalWallFull(fieldBox.x0);
      // Right
      if (openings.right) drawVerticalWallBroken(fieldBox.x1, openings.right.y);
      else                drawVerticalWallFull(fieldBox.x1);

      // Palabras
      const words = wordsForCycle(cycleK);
      if (words.length === 0) {
        // Proyecto terminado.
        const t = document.createElementNS(ns, "text");
        t.setAttribute("x", (fieldBox.x0 + fieldBox.x1) / 2);
        t.setAttribute("y", (fieldBox.y0 + fieldBox.y1) / 2);
        t.setAttribute("text-anchor", "middle");
        t.setAttribute("dominant-baseline", "middle");
        t.setAttribute("fill", "rgba(0,0,0,0.32)");
        t.setAttribute("font-family", "Futura, 'Futura PT', 'Century Gothic', 'Avenir Next', Avenir, sans-serif");
        t.setAttribute("font-weight", "400");
        t.setAttribute("font-size", side * 0.020);
        t.setAttribute("letter-spacing", "0.18em");
        t.textContent = "END";
        svgEl.appendChild(t);
        return { fieldBox, openings, words: [], placed: [] };
      }

      const fontPx = Math.min(fieldBox.x1 - fieldBox.x0, fieldBox.y1 - fieldBox.y0) * 0.045;
      const placed = placeWordsInField(cycleSeed, words, fieldBox, fontPx);

      // Dibujar cada palabra horizontalmente centrada en su posición.
      placed.forEach(p => {
        const t = document.createElementNS(ns, "text");
        t.setAttribute("x", p.cx);
        t.setAttribute("y", p.cy);
        t.setAttribute("text-anchor", "middle");
        t.setAttribute("dominant-baseline", "middle");
        t.setAttribute("fill", "#000000");
        t.setAttribute("font-family", "Futura, 'Futura PT', 'Century Gothic', 'Avenir Next', Avenir, sans-serif");
        t.setAttribute("font-weight", "700");
        t.setAttribute("font-size", p.fontPx);
        t.setAttribute("letter-spacing", "0.06em");
        t.textContent = p.word.toUpperCase();
        svgEl.appendChild(t);
      });

      return { fieldBox, openings, words, placed };
    }

    // ── UI y estado ────────────────────────────────────────────────
    const dateInput = document.getElementById("dateInput");
    const todayButton = document.getElementById("todayButton");
    const toggleUIButton = document.getElementById("toggleUIButton");
    const uiPanel = document.getElementById("uiPanel");
    const pieceTitleEl = document.getElementById("pieceTitle");
    const statsEl = document.getElementById("stats");
    let currentCycle = null;
    let currentWords = [];

    function renderStats(k, seed, words, offset) {
      const startDate = cycleStartDate(k);
      const endDate = cycleStartDate(k + 1);
      const endDateMinus1 = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate() - 1);
      const lines = [];
      lines.push('<div><span class="k">piece</span>' + CLK.ord(k) + (CLK.ord(k) <= 0 ? ' (prenatal)' : '') + '</div>');
      lines.push('<div><span class="k">born</span>' + formatDateSeed(startDate) + '</div>');
      lines.push('<div><span class="k">reigns to</span>' + (k < CLK.count - 1 ? formatDateSeed(new Date(CLK.times[k+1])) : 'now') + '</div>');
      lines.push('<div><span class="k">seed</span>' + seed + '</div>');
      lines.push('<div><span class="k">words</span>' + words.length + '</div>');
      lines.push('<div><span class="k">consumed</span>' + (offset + words.length) + ' / ' + DICT_ORDERED.length + '</div>');
      lines.push('<div><span class="k">remaining</span>' + (DICT_ORDERED.length - offset - words.length) + '</div>');
      statsEl.innerHTML = lines.join("");
    }

    function generate(date) {
      const k = cycleNumberOf(date);
      currentCycle = k;
      const seed = cycleSeedString(k);
      const words = wordsForCycle(k);
      const offset = offsetForCycle(k);
      currentWords = words;

      pieceTitleEl.textContent = "Dear: Words — " + seed;
      document.title = "Dear: Words — " + seed;

      drawField(k);
      renderStats(k, seed, words, offset);
    }

    function toggleUI() {
      const isOpen = uiPanel.classList.toggle("open");
      toggleUIButton.textContent = isOpen ? "Hide UI" : "Show UI";
    }

    function onDateChange() {
      const v = dateInput.value;
      if (!v) return;
      const chosen = parseDateISO(v);
      const today = new Date();
      if (dateIsAfter(chosen, today)) {
        dateInput.value = formatDateISO(today);
        generate(today);
        return;
      }
      if (dateIsBefore(chosen, EPOCH)) {
        dateInput.value = formatDateISO(EPOCH);
        generate(EPOCH);
        return;
      }
      generate(chosen);
    }

    function goToToday() {
      const today = new Date();
      dateInput.value = formatDateISO(today);
      generate(today);
    }

    // ── Export A3 vertical 600 DPI ─────────────────────────────────
    //
    //   dear_words_<MMM.DD.YYYY>_titled.png : con título
    //   dear_words_<MMM.DD.YYYY>.png        : campo solo
    function exportA3() {
      if (currentCycle === null) return;
      buildAndDownloadA3(true).then(() => {
        return buildAndDownloadA3(false);
      });
    }

    function buildAndDownloadA3(withTitle) {
      return new Promise((resolve, reject) => {
        const dpi = 600;
        const mmToIn = 1 / 25.4;
        const pxW = Math.round(297 * mmToIn * dpi);  // 7016
        const pxH = Math.round(420 * mmToIn * dpi);  // 9933

        // Construir SVG completo en string
        const svgClone = svgEl.cloneNode(true);
        const seed = cycleSeedString(currentCycle);

        if (withTitle) {
          const titleEl = document.createElementNS(ns, "text");
          titleEl.setAttribute("x", 800);
          titleEl.setAttribute("y", 90);
          titleEl.setAttribute("text-anchor", "middle");
          titleEl.setAttribute("dominant-baseline", "middle");
          titleEl.setAttribute("fill", "#000000");
          titleEl.setAttribute("font-family", "Futura, 'Futura PT', 'Century Gothic', 'Avenir Next', Avenir, sans-serif");
          titleEl.setAttribute("font-weight", "400");
          titleEl.setAttribute("font-size", 26);
          titleEl.setAttribute("letter-spacing", "0.18em");
          titleEl.textContent = "DEAR: WORDS — " + seed;
          svgClone.appendChild(titleEl);
        }

        const svgStr = new XMLSerializer().serializeToString(svgClone);

        // Crear canvas A3 vertical
        const canvas = document.createElement("canvas");
        canvas.width = pxW;
        canvas.height = pxH;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, pxW, pxH);

        // Renderizar SVG en canvas
        const img = new Image();
        const blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        img.onload = () => {
          // Calcular escala para centrar el SVG en la A3
          // SVG es cuadrado 1600x1600. Lo escalamos al ancho de la A3 con margen.
          const targetSide = pxW * 0.86;
          const x = (pxW - targetSide) / 2;
          const y = (pxH - targetSide) / 2;
          ctx.drawImage(img, x, y, targetSide, targetSide);
          URL.revokeObjectURL(url);

          canvas.toBlob((b) => {
            const a = document.createElement("a");
            const suffix = withTitle ? "_titled" : "";
            a.href = URL.createObjectURL(b);
            a.download = "dear_words_" + seed + suffix + ".png";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            resolve();
          }, "image/png");
        };
        img.onerror = reject;
        img.src = url;
      });
    }

    // ── Listeners y arranque ───────────────────────────────────────
    toggleUIButton.addEventListener("click", toggleUI);
    todayButton.addEventListener("click", goToToday);
    dateInput.addEventListener("change", onDateChange);
    document.getElementById("exportButton").addEventListener("click", exportA3);

    (function init() {
      DICT_ORDERED = shuffleDictionary();
      const today = new Date();
      dateInput.min = formatDateISO(EPOCH);
      dateInput.max = formatDateISO(today);
      dateInput.value = formatDateISO(today);
      generate(today);
    })();
  })();
  </script>

<script>
/* Navegación por ordinal: ← → recorren las piezas (preestreno + vida). */
document.addEventListener('keydown', function(e){
  if(e.key!=='ArrowLeft' && e.key!=='ArrowRight') return;
  var cur = (typeof currentCycle==='number' && currentCycle!==null) ? currentCycle : CLK.idxAt(Date.now());
  var nk = Math.max(0, Math.min(CLK.count-1, cur + (e.key==='ArrowRight'?1:-1)));
  if(nk!==cur && typeof generate==='function'){ generate(new Date(CLK.times[nk]+1000)); }
});
</script>
