<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dear: Poems</title>

  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      background: #ffffff;
      color: #111111;

      font-size: 12px;
    }

    #app {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #ffffff;
    }

    #plan {
      width: min(96vmin, calc(100vw - 36px));
      height: min(96vmin, calc(100vh - 36px));
      display: block;
      background: #ffffff;
    }

    button {
      position: fixed;
      z-index: 260;
      border: none;
      border-radius: 4px;
      padding: 8px 12px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 200;
      font-size: 12px;
      line-height: 1;
      color: #111111;
      background: rgba(0,0,0,0.08);
      cursor: pointer;
      transition: background .2s;
    }

    button:hover { background: rgba(0,0,0,0.14); }

    #dayTitle {
      position: fixed;
      top: 16px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 200;
      pointer-events: none;
      user-select: none;
    }

    #pieceTitle {
      font-family: Futura, "Futura PT", "Century Gothic", "Avenir Next", Avenir, sans-serif;
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(0,0,0,0.32);
    }

    #toggleUIButton {
      left: 10px;
      bottom: 10px;
      background: transparent;
      border-radius: 0;
      padding: 8px 4px;
      font-family: Futura, "Futura PT", "Century Gothic", "Avenir Next", Avenir, sans-serif;
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(0,0,0,0.55);
      text-transform: none;
      transition: color 0.2s;
    }

    #toggleUIButton:hover {
      background: transparent;
      color: #111111;
    }

    #uiPanel {
      position: fixed;
      left: 10px;
      bottom: 50px;
      z-index: 250;
      width: 320px;
      max-height: min(78vh, 720px);
      overflow-y: auto;
      overflow-x: hidden;
      display: none;
      padding: 12px;
      border-radius: 5px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

  </style>

<body>
  <header id="dayTitle">

  <main id="app">
    <svg id="plan" viewBox="0 0 1600 1600" role="img" aria-label="Planta del día"></svg>
  </main>

  <aside id="uiPanel">

    <details>
      <summary>structure</summary>

    </details>

  <script>
  (function () {
    "use strict";

    // ════════════════════════════════════════════════════════════════
    //  Dear: Poems
    //
    //  Una pieza de Dear: Architectures.
    //
    //  Cada día, una casa. La fecha es la semilla literal del sistema,
    //  en formato MMM.DD.YYYY al estilo de los Today Series de On
    //  Kawara. Misma fecha, misma casa, siempre.
    //
    //  Fecha cero del sistema: 16 de mayo de 2026.
    //
    //  Régimen temporal heredado de Hanne Darboven: el calendario
    //  produce material verificable. La obra no se consume; se
    //  espera. Cada casa requiere su día para existir.
    //
    //  Sistema combinatorio cerrado: universo de 120 permutaciones
    //  de {1,2,3,4,5}. Cada cuarto deriva determinísticamente de
    //  una permutación. La búsqueda interna descarta combinaciones
    //  que colisionan y reintenta con variaciones deterministas de
    //  la semilla, sin azar.
    //
    //  Cada recinto contiene un poema de cinco líneas verticales.
    //  Cuatro líneas son palabras de cuatro vocabularios distintos.
    //  La quinta línea es silencio inscrito: espacio en blanco del
    //  alto de una línea tipográfica, posición determinada por la
    //  permutación. Mallarmé: el blanco es activo. Ungaretti: los
    //  silencios tienen duración medida. Celan: el aliento es la
    //  métrica.
    //
    //  Las palabras no nombran, residen. Arquitecturas para poemas.
    // ════════════════════════════════════════════════════════════════

    // ── Vocabulario cerrado: cinco tipos de cuarto ─────────────────
    const ROOM_TYPES = [
      { key: "bath",    label: "bath" },
      { key: "kitchen", label: "kitchen" },
      { key: "living",  label: "living" },
      { key: "bedroom", label: "bedroom" },
      { key: "dining",  label: "dining" }
    ];

    // ── Sistema literario: poema de cinco versos por recinto ───────
    //
    //   Cuatro vocabularios de cinco palabras cada uno. El poema tiene
    //   cinco líneas verticales: cuatro palabras + un silencio
    //   inscrito (línea vacía del alto de una línea tipográfica).
    //
    //   Vocabularios:
    //     - CUERPO: lo que toca el lenguaje y el espacio.
    //     - CUARTOS: los cinco tipos de habitación (también ROOM_TYPES).
    //     - MATERIA: sustancias austeras, lo que queda.
    //     - HUELLA: marca, rastro, lo no dicho.
    //
    //   Mapeo determinista (preserva la lógica de PRMTTN / Phrases):
    //     P1 → palabra de CUERPO       (índice P1-1)
    //     P2 → palabra de CUARTOS      (índice P2-1)
    //     P3 → palabra de MATERIA      (índice P3-1)
    //     P4 → palabra de HUELLA       (índice P4-1)
    //     P5 → línea del silencio en la columna (1 a 5).
    //     lehmerRank(perm) mod 24 → orden de las cuatro palabras
    //
    //   El silencio puede caer en cualquiera de las cinco líneas.
    //   Tres modos de poema según donde caiga:
    //     - en línea 1: inhalación expandida al margen superior.
    //     - en líneas 2-4: pausa interna, atemwende de Celan.
    //     - en línea 5: cola elegíaca expandida al margen inferior.
    //   La diversidad de modos es la pieza. Mallarmé: el blanco es
    //   activo, también cuando se funde con el margen.
    //
    //   Las 120 permutaciones producen 120 poemas únicos.
    const VOCAB_BODY   = ["skin",   "throat",  "tongue",  "finger",  "lung"];
    const VOCAB_ROOMS  = ["bath",   "kitchen", "living",  "bedroom", "dining"];
    const VOCAB_MATTER = ["chalk",  "glass",   "bone",    "stone",   "gold"];
    const VOCAB_TRACE  = ["fold",   "mark",    "trace",   "blank",   "silence"];

    // Etiquetas de los cuatro vocabularios, para identificar versos.
    // El silencio se marca con "_" y se renderiza como línea vacía.
    const VOCAB_LABELS = ["B", "R", "M", "T"];  // body, rooms, matter, trace

    // Los 24 órdenes posibles de cuatro elementos {B, R, M, T}.
    // Cada permutación de 5 dígitos selecciona uno de estos 24
    // órdenes vía lehmerRank(perm) mod 24.
    const VERSE_ORDERS = [
      ["B","R","M","T"], ["B","R","T","M"], ["B","M","R","T"],
      ["B","M","T","R"], ["B","T","R","M"], ["B","T","M","R"],
      ["R","B","M","T"], ["R","B","T","M"], ["R","M","B","T"],
      ["R","M","T","B"], ["R","T","B","M"], ["R","T","M","B"],
      ["M","B","R","T"], ["M","B","T","R"], ["M","R","B","T"],
      ["M","R","T","B"], ["M","T","B","R"], ["M","T","R","B"],
      ["T","B","R","M"], ["T","B","M","R"], ["T","R","B","M"],
      ["T","R","M","B"], ["T","M","B","R"], ["T","M","R","B"]
    ];

    // Devuelve un array de 5 strings: cuatro palabras + un "_" para el
    // silencio inscrito. La posición del "_" la decide P5.
    function poemFromPerm(perm) {
      const p1 = perm[0], p2 = perm[1], p3 = perm[2], p4 = perm[3], p5 = perm[4];

      // Las cuatro palabras vienen de los cuatro vocabularios, en sus
      // posiciones fijas (P1→cuerpo, P2→cuartos, P3→materia, P4→huella).
      const slots = {
        B: VOCAB_BODY[(p1 - 1) % 5],
        R: VOCAB_ROOMS[(p2 - 1) % 5],
        M: VOCAB_MATTER[(p3 - 1) % 5],
        T: VOCAB_TRACE[(p4 - 1) % 5]
      };

      // El orden de las cuatro palabras lo decide el Lehmer rank de
      // la permutación entera, módulo 24. Misma permutación → mismo
      // orden, preservando la lógica de Phrases.
      const orderIdx = lehmerRank(perm) % VERSE_ORDERS.length;
      const order = VERSE_ORDERS[orderIdx];
      const fourVerses = order.map(k => slots[k]);

      // El silencio se inserta en la línea P5 (1 a 5). El silencio
      // puede caer en cualquiera de las cinco líneas, produciendo
      // tres modos de poema:
      //   - silencio en línea 1: inhalación expandida al margen
      //     superior del recinto. El recinto respira antes de hablar.
      //   - silencio entre versos (líneas 2, 3, 4): pausa interna,
      //     atemwende de Celan, corte dentro del poema.
      //   - silencio en línea 5: cola elegíaca expandida al margen
      //     inferior. Lo que queda después de la última palabra.
      // Las tres formas son distintas, ninguna mejor que otra.
      // La pieza opera en los tres modos a lo largo del calendario.
      const silenceIdx = (p5 - 1) % 5;

      const lines = new Array(5);
      lines[silenceIdx] = "_";
      let vi = 0;
      for (let i = 0; i < 5; i++) {
        if (i === silenceIdx) continue;
        lines[i] = fourVerses[vi++];
      }
      return lines;
    }

    // ── Grilla 5×5 ─────────────────────────────────────────────────
    const GRID = 5;
    const SVG_SIZE = 1600;
    const SVG_NS = "http://www.w3.org/2000/svg";

    // ── Universo de permutaciones de {1,2,3,4,5} ───────────────────
    function getAllPermutations(arr) {
      if (arr.length === 1) return [arr];
      const out = [];
      for (let i = 0; i < arr.length; i++) {
        const rest = arr.slice(0, i).concat(arr.slice(i + 1));
        for (const p of getAllPermutations(rest)) out.push([arr[i]].concat(p));
      }
      return out;
    }
    const ALL_PERMS = getAllPermutations([1, 2, 3, 4, 5]);     // 120
    const ALL_MAPPINGS = getAllPermutations([0, 1, 2, 3, 4]);  // 120

    // ── Operaciones canónicas ──────────────────────────────────────
    const FACT = [1, 1, 2, 6, 24, 120];

    function lehmerRank(p) {
      let r = 0;
      for (let i = 0; i < p.length; i++) {
        let c = 0;
        for (let j = i + 1; j < p.length; j++) if (p[j] < p[i]) c++;
        r += c * FACT[p.length - 1 - i];
      }
      return r;
    }

    function mappingRank(m) {
      return lehmerRank([m[0] + 1, m[1] + 1, m[2] + 1, m[3] + 1, m[4] + 1]);
    }

    // ── Hash determinista de cadena → semilla numérica ─────────────
    function hashString(str) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function () {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ── Selección determinista de N permutaciones ──────────────────
    //   La semilla del rng deriva de la cadena de entrada.
    //   Misma cadena → mismas permutaciones, siempre.
    function pickPermutations(rng, n) {
      const used = new Set();
      const out = [];
      while (out.length < n) {
        const i = Math.floor(rng() * ALL_PERMS.length);
        if (!used.has(i)) {
          used.add(i);
          out.push(ALL_PERMS[i]);
        }
      }
      return out;
    }

    // ── Invariante de escena: globalShift ──────────────────────────
    function computeGlobalShift(perms, m) {
      let sumR = 0;
      perms.forEach(p => { sumR += lehmerRank(p); });
      return (sumR + mappingRank(m)) % (GRID * GRID);
    }

    // ── Proyección permutación → cuarto ────────────────────────────
    //
    //   Mapping m = permutación de {0,1,2,3,4} que asigna posiciones
    //   a atributos: [0]=tipo, [1]=ancho, [2]=alto, [3]=x, [4]=y.
    //
    //   Cada permutación P, leída a través del mapping m, produce:
    //     tipo  = ((P[m[0]] - 1) + LehmerRank(P)) mod 5
    //     ancho = P[m[1]]                                ∈ {1..5}
    //     alto  = P[m[2]]                                ∈ {1..5}
    //     xBase = P[m[3]] - 1                            ∈ {0..4}
    //     yBase = P[m[4]] - 1                            ∈ {0..4}
    //
    //   La posición final aplica un desplazamiento global de escena.
    //   Si el cuarto se sale por borde, se recorta su tamaño.
    function projectRoom(perm, m, globalShift) {
      const r = lehmerRank(perm);
      const tipoIdx = ((perm[m[0]] - 1) + r) % 5;
      const w = perm[m[1]];
      const h = perm[m[2]];
      const xBase = (perm[m[3]] - 1);
      const yBase = (perm[m[4]] - 1);

      const sx = globalShift % GRID;
      const sy = Math.floor(globalShift / GRID) % GRID;

      const x = (xBase + sx) % GRID;
      const y = (yBase + sy) % GRID;

      const wClipped = Math.min(w, GRID - x);
      const hClipped = Math.min(h, GRID - y);

      return {
        perm: perm,
        rank: r,
        tipoIdx: tipoIdx,
        type: ROOM_TYPES[tipoIdx],
        x: x, y: y,
        w: wClipped, h: hClipped
      };
    }

    function projectHouse(perms, m, globalShift) {
      return perms.map(p => projectRoom(p, m, globalShift));
    }

    // ── Detección de colisiones ────────────────────────────────────
    function roomsOverlap(a, b) {
      return !(a.x + a.w <= b.x ||
               b.x + b.w <= a.x ||
               a.y + a.h <= b.y ||
               b.y + b.h <= a.y);
    }

    function houseHasCollisions(rooms) {
      for (let i = 0; i < rooms.length; i++) {
        for (let j = i + 1; j < rooms.length; j++) {
          if (roomsOverlap(rooms[i], rooms[j])) return true;
        }
      }
      return false;
    }

    // ── Búsqueda determinista de mapping sin colisión ──────────────
    function findValidMapping(perms) {
      for (let mi = 0; mi < ALL_MAPPINGS.length; mi++) {
        const m = ALL_MAPPINGS[mi];
        const gs = computeGlobalShift(perms, m);
        const rooms = projectHouse(perms, m, gs);
        if (!houseHasCollisions(rooms)) {
          return { mapping: m, mappingIdx: mi, globalShift: gs, rooms: rooms };
        }
      }
      return null;
    }

    // ── Generador de casa (estilo Strachey / PRMTTN) ───────────────
    //
    //   Para una semilla y un n, intentamos encontrar una casa
    //   sin colisiones. La estrategia es PRMTTN traducida a
    //   determinismo:
    //
    //   1) Probamos las permutaciones derivadas de la semilla.
    //      Si algún mapping de los 120 produce casa limpia, esa
    //      es la casa.
    //   2) Si no, derivamos una variación determinista de la
    //      semilla (seed + ":v=1", ":v=2", ...) y repetimos.
    //   3) Si tras 100 variaciones nada funciona, bajamos n y
    //      volvemos al paso 1.
    //   4) En el fondo siempre llegamos: n=1 con cualquier mapping
    //      siempre cabe en la grilla.
    //
    //   La búsqueda es invisible al usuario. El sistema no expone
    //   las variaciones ni el descenso de n. Solo aparece la casa.
    function generateHouse(seed, requestedN) {
      const MAX_VARIATIONS = 100;

      for (let n = requestedN; n >= 1; n--) {
        for (let v = 0; v <= MAX_VARIATIONS; v++) {
          const effectiveSeed = v === 0
            ? seed + ":n=" + n
            : seed + ":n=" + n + ":v=" + v;

          const rng = mulberry32(hashString(effectiveSeed));
          const perms = pickPermutations(rng, n);
          const found = findValidMapping(perms);

          if (found) {
            return {
              perms: perms,
              mapping: found.mapping,
              mappingIdx: found.mappingIdx,
              globalShift: found.globalShift,
              rooms: found.rooms,
              requestedN: requestedN,
              effectiveN: n,
              variation: v
            };
          }
        }
      }

      return null;  // matemáticamente imposible (n=1 siempre cabe)
    }

    // ── Cálculo de puertas ─────────────────────────────────────────
    //
    //   Una puerta por cada par de cuartos adyacentes (que comparten
    //   muro). Si un cuarto no toca a ningún otro, recibe una puerta
    //   al exterior en su lado más largo.
    function computeDoors(rooms) {
      const shared = [];

      for (let i = 0; i < rooms.length; i++) {
        for (let j = i + 1; j < rooms.length; j++) {
          const A = rooms[i], B = rooms[j];

          // Pared vertical compartida
          if (A.x + A.w === B.x || B.x + B.w === A.x) {
            const yStart = Math.max(A.y, B.y);
            const yEnd = Math.min(A.y + A.h, B.y + B.h);
            if (yEnd > yStart) {
              const xWall = (A.x + A.w === B.x) ? B.x : A.x;
              shared.push({
                a: i, b: j,
                side: "vertical",
                xWall: xWall,
                start: yStart,
                end: yEnd,
                len: yEnd - yStart
              });
            }
          }

          // Pared horizontal compartida
          if (A.y + A.h === B.y || B.y + B.h === A.y) {
            const xStart = Math.max(A.x, B.x);
            const xEnd = Math.min(A.x + A.w, B.x + B.w);
            if (xEnd > xStart) {
              const yWall = (A.y + A.h === B.y) ? B.y : A.y;
              shared.push({
                a: i, b: j,
                side: "horizontal",
                yWall: yWall,
                start: xStart,
                end: xEnd,
                len: xEnd - xStart
              });
            }
          }
        }
      }

      // Por pareja: si comparten más de un segmento, quedarnos con el más largo.
      const longestByPair = new Map();
      shared.forEach(s => {
        const key = s.a + "-" + s.b;
        const prev = longestByPair.get(key);
        if (!prev || s.len > prev.len) longestByPair.set(key, s);
      });

      const doors = [];
      longestByPair.forEach(s => {
        doors.push(makeDoorFromSegment(s));
      });

      // Componentes conexos por adyacencia (union-find).
      // Cada componente debe tener al menos una puerta al exterior;
      // de lo contrario sus cuartos quedan atrapados.
      const parent = rooms.map((_, i) => i);
      function find(x) {
        while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; }
        return x;
      }
      function unite(a, b) {
        const ra = find(a), rb = find(b);
        if (ra !== rb) parent[ra] = rb;
      }
      longestByPair.forEach(s => unite(s.a, s.b));

      const components = new Map();
      rooms.forEach((R, i) => {
        const root = find(i);
        if (!components.has(root)) components.set(root, []);
        components.get(root).push(i);
      });

      // Para cada componente, asegurar una puerta al exterior.
      // Elegimos el cuarto del componente con el lado exterior más
      // largo que dé al vacío de la grilla, y le añadimos puerta ahí.
      components.forEach(members => {
        const exteriorDoor = pickBestExteriorDoor(rooms, members);
        if (exteriorDoor) doors.push(exteriorDoor);
      });

      return doors;
    }

    // Para un componente (lista de índices de cuartos), elegir la mejor
    // puerta al exterior: el lado más largo de cualquier cuarto del
    // componente que dé al vacío (no toque otro cuarto del componente
    // o de cualquier otro). Retorna null si no se encuentra.
    function pickBestExteriorDoor(rooms, members) {
      let best = null;

      members.forEach(idx => {
        const R = rooms[idx];

        // Cuatro lados candidatos: top, bottom, left, right
        // Para cada lado, recorrer celda por celda y encontrar los
        // tramos que dan al vacío de la grilla (no a otro cuarto).
        const sides = [
          { name: "top",    side: "horizontal", yWall: R.y,         xStart: R.x, xEnd: R.x + R.w, isOutwardY: -1 },
          { name: "bottom", side: "horizontal", yWall: R.y + R.h,   xStart: R.x, xEnd: R.x + R.w, isOutwardY: +1 },
          { name: "left",   side: "vertical",   xWall: R.x,         yStart: R.y, yEnd: R.y + R.h, isOutwardX: -1 },
          { name: "right",  side: "vertical",   xWall: R.x + R.w,   yStart: R.y, yEnd: R.y + R.h, isOutwardX: +1 }
        ];

        sides.forEach(sd => {
          // Recorrer celda por celda y agrupar segmentos contiguos
          // donde el lado exterior cae fuera de la grilla o en celda
          // no ocupada por otro cuarto.
          let segs = [];
          let curStart = null;

          if (sd.side === "horizontal") {
            const outY = sd.yWall + (sd.isOutwardY < 0 ? -1 : 0);
            // outY < 0 → fuera de la grilla; outY >= GRID → fuera
            for (let x = sd.xStart; x < sd.xEnd; x++) {
              const isFree = outY < 0 || outY >= GRID || !cellOccupied(rooms, x, outY);
              if (isFree) {
                if (curStart === null) curStart = x;
              } else {
                if (curStart !== null) { segs.push([curStart, x]); curStart = null; }
              }
            }
            if (curStart !== null) segs.push([curStart, sd.xEnd]);

            segs.forEach(([s, e]) => {
              const len = e - s;
              if (!best || len > best.len) {
                const mid = (s + e) / 2;
                const doorLen = Math.min(DOOR_LEN, len * 0.8);
                best = {
                  len: len,
                  door: {
                    side: "horizontal",
                    yWall: sd.yWall,
                    start: mid - doorLen / 2,
                    end: mid + doorLen / 2
                  }
                };
              }
            });
          } else {
            const outX = sd.xWall + (sd.isOutwardX < 0 ? -1 : 0);
            for (let y = sd.yStart; y < sd.yEnd; y++) {
              const isFree = outX < 0 || outX >= GRID || !cellOccupied(rooms, outX, y);
              if (isFree) {
                if (curStart === null) curStart = y;
              } else {
                if (curStart !== null) { segs.push([curStart, y]); curStart = null; }
              }
            }
            if (curStart !== null) segs.push([curStart, sd.yEnd]);

            segs.forEach(([s, e]) => {
              const len = e - s;
              if (!best || len > best.len) {
                const mid = (s + e) / 2;
                const doorLen = Math.min(DOOR_LEN, len * 0.8);
                best = {
                  len: len,
                  door: {
                    side: "vertical",
                    xWall: sd.xWall,
                    start: mid - doorLen / 2,
                    end: mid + doorLen / 2
                  }
                };
              }
            });
          }
        });
      });

      return best ? best.door : null;
    }

    // ¿La celda (x,y) está ocupada por algún cuarto?
    function cellOccupied(rooms, x, y) {
      for (const R of rooms) {
        if (x >= R.x && x < R.x + R.w && y >= R.y && y < R.y + R.h) return true;
      }
      return false;
    }

    // Tamaño de puerta uniforme, expresado en unidades de celda.
    const DOOR_LEN = 0.4;

    function makeDoorFromSegment(seg) {
      const doorLen = Math.min(DOOR_LEN, seg.len * 0.8);
      const mid = (seg.start + seg.end) / 2;
      if (seg.side === "vertical") {
        return {
          side: "vertical",
          xWall: seg.xWall,
          start: mid - doorLen / 2,
          end: mid + doorLen / 2
        };
      } else {
        return {
          side: "horizontal",
          yWall: seg.yWall,
          start: mid - doorLen / 2,
          end: mid + doorLen / 2
        };
      }
    }

    function makeExteriorDoor(R) {
      const doorLen = Math.min(DOOR_LEN, Math.min(R.w, R.h) * 0.8);
      if (R.w >= R.h) {
        const midX = R.x + R.w / 2;
        return {
          side: "horizontal",
          yWall: R.y + R.h,
          start: midX - doorLen / 2,
          end: midX + doorLen / 2
        };
      } else {
        const midY = R.y + R.h / 2;
        return {
          side: "vertical",
          xWall: R.x + R.w,
          start: midY - doorLen / 2,
          end: midY + doorLen / 2
        };
      }
    }

    // ── Render SVG ─────────────────────────────────────────────────
    const planEl = document.getElementById("plan");

    function createSvg(name, attrs) {
      const node = document.createElementNS(SVG_NS, name);
      Object.keys(attrs || {}).forEach(k => node.setAttribute(k, attrs[k]));
      return node;
    }

    function drawPlan(house) {
      planEl.innerHTML = "";

      const margin = 120;
      const available = SVG_SIZE - margin * 2;
      const cell = available / GRID;
      const ox = (SVG_SIZE - cell * GRID) / 2;
      const oy = (SVG_SIZE - cell * GRID) / 2;

      // fondo
      planEl.appendChild(createSvg("rect", {
        x: 0, y: 0, width: SVG_SIZE, height: SVG_SIZE, fill: "#ffffff"
      }));

      if (!house) return;

      // cuartos: relleno blanco sólido
      house.rooms.forEach(room => {
        planEl.appendChild(createSvg("rect", {
          x: ox + room.x * cell,
          y: oy + room.y * cell,
          width: room.w * cell,
          height: room.h * cell,
          fill: "#ffffff"
        }));
      });

      // muros negros gruesos
      const wallW = Math.max(6, cell * 0.045);
      house.rooms.forEach(room => {
        planEl.appendChild(createSvg("rect", {
          x: ox + room.x * cell,
          y: oy + room.y * cell,
          width: room.w * cell,
          height: room.h * cell,
          fill: "none",
          stroke: "#000000",
          "stroke-width": wallW,
          "stroke-linecap": "square",
          "stroke-linejoin": "miter"
        }));
      });

      // puertas
      drawDoors(planEl, house, ox, oy, cell, wallW);

      // etiquetas: un poema determinista de cinco líneas por recinto,
      // derivado de la permutación. Cuatro palabras + un silencio
      // inscrito (línea vacía del alto de una línea tipográfica).
      // La altura total de la columna es siempre 5 líneas. Si el
      // poema no cabe, se omite.
      house.rooms.forEach(room => {
        const cx = ox + (room.x + room.w / 2) * cell;
        const cy = oy + (room.y + room.h / 2) * cell;
        const fontSize = cell * 0.10;
        const lineHeight = fontSize * 1.5;

        const lines = poemFromPerm(room.perm);

        // ¿Cabe el poema entero (5 líneas, considerando la más larga
        // de las palabras visibles) en este recinto?
        const visibleWords = lines.filter(w => w !== "_");
        const longestWord = visibleWords.reduce((a, b) => a.length > b.length ? a : b);
        const textW = longestWord.length * fontSize * 0.65;
        const textH = lineHeight * lines.length;  // siempre 5 líneas
        const roomW = room.w * cell;
        const roomH = room.h * cell;
        const minMargin = wallW * 1.5;

        if (textW > roomW - minMargin * 2) return;
        if (textH > roomH - minMargin * 2) return;

        // Dibujar cada línea. Si la línea es "_" (silencio inscrito),
        // se omite el elemento <text> pero la posición vertical se
        // mantiene: la columna siempre ocupa 5 líneas de altura.
        const startY = cy - (lineHeight * (lines.length - 1)) / 2;
        lines.forEach((w, i) => {
          if (w === "_") return;  // silencio: línea totalmente vacía
          const t = createSvg("text", {
            x: cx, y: startY + i * lineHeight,
            "text-anchor": "middle",
            "dominant-baseline": "middle",
            fill: "#000000",
            "font-family": "Futura, 'Futura PT', 'Century Gothic', 'Avenir Next', Avenir, sans-serif",
            "font-weight": "700",
            "font-size": fontSize,
            "letter-spacing": "0.06em"
          });
          t.textContent = w.toUpperCase();
          planEl.appendChild(t);
        });
      });
    }

    function drawDoors(svg, house, ox, oy, cell, wallW) {
      const doors = computeDoors(house.rooms);
      const doorThickness = wallW * 1.2;

      doors.forEach(d => {
        if (d.side === "vertical") {
          svg.appendChild(createSvg("rect", {
            x: ox + d.xWall * cell - doorThickness / 2,
            y: oy + d.start * cell,
            width: doorThickness,
            height: (d.end - d.start) * cell,
            fill: "#ffffff",
            stroke: "none"
          }));
        } else {
          svg.appendChild(createSvg("rect", {
            x: ox + d.start * cell,
            y: oy + d.yWall * cell - doorThickness / 2,
            width: (d.end - d.start) * cell,
            height: doorThickness,
            fill: "#ffffff",
            stroke: "none"
          }));
        }
      });
    }

    // ── Panel de estructura (oculto por defecto) ───────────────────
    function renderStats(seed, house) {
      const target = document.getElementById("stats");
      if (!house) {
        target.textContent = "semilla: " + seed + "\n(sin casa)";
        return;
      }

      const lines = [
        "semilla: " + seed,
        "grilla: " + GRID + "×" + GRID,
        "n pedido: " + house.requestedN,
        "n efectivo: " + house.effectiveN,
        "permutaciones: " + house.perms.length,
        ""
      ];
      house.rooms.forEach((r, i) => {
        lines.push(
          String(i + 1).padStart(2, "0") +
          " · (" + r.perm.join(",") + ")" +
          " · r=" + r.rank +
          " · " + r.type.label +
          " · " + r.w + "×" + r.h +
          " · @(" + r.x + "," + r.y + ")"
        );
      });
      target.textContent = lines.join("\n");
    }

    // ── UI mínima ──────────────────────────────────────────────────
    const dateInput = document.getElementById("dateInput");
    const todayButton = document.getElementById("todayButton");
    const toggleUIButton = document.getElementById("toggleUIButton");
    const uiPanel = document.getElementById("uiPanel");
    const pieceTitleEl = document.getElementById("pieceTitle");

    let currentHouse = null;
    let currentSeed = null;
    let currentDate = null;

    // ── Fechas ─────────────────────────────────────────────────────
    //
    //   La fecha es la semilla. Sin transformación. Formato:
    //   "MAY.16.2026" (mes en tres letras mayúsculas, día sin
    //   relleno de cero, año cuatro dígitos, separados por punto).
    //   Al estilo de los Today Series de On Kawara.
    //
    //   Una fecha → una casa. Misma fecha, siempre la misma casa.
    //   No hay fechas futuras ni anteriores a la fundación: la obra
    //   solo existe entre la fecha cero y hoy.
    const MONTH_NAMES = [
      "JAN", "FEB", "MAR", "APR", "MAY", "JUN",
      "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"
    ];

    // Fecha cero del sistema Dear: Architectures.
    // El proyecto entero comenzó el 16 de mayo de 2026.
    const EPOCH = new Date(2026, 4, 16);  // mes 4 = mayo (0-indexed)

    /* ═══════════ EL RELOJ DE DEAR: (módulo canónico, autocontenido) ═══════════
       Esta obra ya no lee el calendario del mundo: lee el reloj (Dear: Time).
       Big Bang: 22 jun 2026 00:00 — la Gran Conjunción (todas las manecillas en 1).
       La obra tiene un GENOMA: la permutación nacida de su título por el motor
       canónico. Es llamada (engendra una pieza) cada vez que las 4 manecillas
       lentas del reloj entran al estado exacto de su genoma (época fina); N1,
       el segundero, deletrea el genoma completo dentro de cada época.
       Piezas prenatales (n ≤ 0): el reloj proléptico — la última temporada
       anterior al Big Bang, navegable; ceden el lugar cuando llega la vida.
       Semilla de la pieza n: hash(genoma + '#' + n). Fertilidad: la escalera
       Φ = 1 + ((L + n) mod 24), continua a través del nacimiento. */
    const CLK = (function(){
      const BIRTH_MS = new Date(2026, 5, 22, 0, 0, 0, 0).getTime();
      const TITLE = "Dear: Poems";
      function chash(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
      function crng(seed){ let a=seed>>>0; return function(){ a=(a+0x6D2B79F5)>>>0; let t=a; t=Math.imul(t^(t>>>15),t|1); t^=t+Math.imul(t^(t>>>7),t|61); return ((t^(t>>>14))>>>0)/4294967296; }; }
      function cperms(arr){ if(arr.length<=1) return [arr]; const out=[]; for(let i=0;i<arr.length;i++){ const c=arr[i], rest=arr.slice(0,i).concat(arr.slice(i+1)); for(const p of cperms(rest)) out.push([c].concat(p)); } return out; }
      const P120 = cperms([1,2,3,4,5]);
      function clehmer(p){ const F=[1,1,2,6,24,120]; let r=0; for(let i=0;i<p.length;i++){ let c=0; for(let j=i+1;j<p.length;j++) if(p[j]<p[i]) c++; r+=c*F[p.length-1-i]; } return r; }
      function firstPerm(seedStr){ const g=crng(chash(seedStr)); return P120[Math.floor(g()*120)]; }
      // Manecillas natales de Time (idéntico a dear_time: seed "JUN.22.2026")
      const natal = (function(){ const g=crng(chash("JUN.22.2026")); const idx=[], u=new Set();
        while(idx.length<5){ const i=Math.floor(g()*120); if(!u.has(i)){ u.add(i); idx.push(i);} }
        return idx.map(i=>{ const p=P120[i]; return Math.pow(2,(119-clehmer(p))/5); }); })();
      // Períodos en segundos de N2..N5 (las 4 lentas; natal[0] es N1, el segundero)
      const PER = [natal[1], natal[2], natal[3], natal[4]];
      const GENOME = firstPerm(TITLE);
      const L = clehmer(GENOME);
      const TGT = [GENOME[1], GENOME[2], GENOME[3], GENOME[4]];
      function hand(t, per){ const s=Math.floor(t/per); return ((s%5)+5)%5+1; }
      // Épocas propias: aperturas del estado (N2..N5) = genoma, desde el inicio
      // de la temporada prenatal de la obra hasta ahora.
      const P_N3 = PER[1];
      const backT = -(6 - GENOME[2]) * P_N3;         // inicio del preestreno (s)
      function computeTimes(){
        const nowT = (Date.now() - BIRTH_MS)/1000;
        const evts = [backT];
        for(const per of PER){
          let t = Math.ceil(backT/per)*per;
          if(t<=backT) t+=per;
          for(; t<=nowT; t+=per) evts.push(t);
        }
        evts.sort(function(a,b){return a-b;});
        const times=[]; let inState=false;
        for(let i=0;i<evts.length;i++){
          const t=evts[i]+1e-3;
          const ok = hand(t,PER[0])===TGT[0] && hand(t,PER[1])===TGT[1] &&
                     hand(t,PER[2])===TGT[2] && hand(t,PER[3])===TGT[3];
          if(ok && !inState) times.push(BIRTH_MS + evts[i]*1000);
          inState = ok;
        }
        return times;
      }
      const times = computeTimes();
      let preCount = 0; for(const t of times) if(t < BIRTH_MS) preCount++;
      function ord(i){ return i - preCount + 1; }
      function phi(i){ return 1 + ((((L + ord(i)) % 24) + 24) % 24); }
      function seedStr(i){ return GENOME.join(',') + '#' + ord(i); }
      function idxAt(ms){
        if(!times.length) return 0;
        let lo=0, hi=times.length-1, ans=0;
        if(ms < times[0]) return 0;
        while(lo<=hi){ const m=(lo+hi)>>1; if(times[m]<=ms){ ans=m; lo=m+1; } else hi=m-1; }
        return ans;
      }
      return { times:times, count:times.length, preCount:preCount,
               GENOME:GENOME, L:L, ord:ord, phi:phi, seedStr:seedStr, idxAt:idxAt,
               BIRTH_MS:BIRTH_MS };
    })();


    function formatDateSeed(date) {
      const m = MONTH_NAMES[date.getMonth()];
      const d = date.getDate();
      const y = date.getFullYear();
      return m + "." + d + "." + y;
    }

    // ── Regla canónica de fertilidad (Q3) ──────────────────────────
    //
    //   Cuántas permutaciones engendra una fecha. Universal a las cinco
    //   obras de Dear:. Nace de la fecha misma (no de un oráculo):
    //
    //     fertilidad = 1 + ( [ rdig(día)·rdig(mes)·rdig(sumaCifrasAño)
    //                          + día + mes ] mod 24 )
    //
    //   rdig = raíz digital (reducir a un dígito sumando cifras).
    function rdig(n) { n = Math.abs(n); if (n === 0) return 0; const r = n % 9; return r === 0 ? 9 : r; }
    function sumaCifrasAnio(y) { return String(y).split('').reduce((a, b) => a + (+b), 0); }
    function fertility(date) {
      const dia = date.getDate(), mes = date.getMonth() + 1;
      const sY = sumaCifrasAnio(date.getFullYear());
      const k = rdig(dia) * rdig(mes) * rdig(sY) + dia + mes;
      return 1 + (((k % 24) + 24) % 24);
    }

    function formatDateISO(date) {
      // Para el <input type="date">: yyyy-mm-dd
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function parseDateISO(s) {
      // Parsea yyyy-mm-dd como fecha local (no UTC).
      const parts = s.split("-");
      return new Date(parseInt(parts[0], 10),
                      parseInt(parts[1], 10) - 1,
                      parseInt(parts[2], 10));
    }

    function dateIsAfter(a, b) {
      // ¿a es estrictamente posterior a b en términos de día?
      const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      return A.getTime() > B.getTime();
    }

    function dateIsBefore(a, b) {
      const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      return A.getTime() < B.getTime();
    }

    // ── Generación de la casa del día ──────────────────────────────
    //
    //   El número de cuartos también deriva determinísticamente
    //   de la fecha. No hay control manual.
    function generate(date) {
      currentDate = date;
      const kIdx = CLK.idxAt(date.getTime()); window.CLK_CUR = kIdx;
      const seed = CLK.seedStr(kIdx);   // genoma + '#' + ordinal
      const bornLabel = 'piece ' + CLK.ord(kIdx) + (CLK.ord(kIdx) <= 0 ? ' (prenatal)' : '') + ' · ' + formatDateSeed(new Date(CLK.times[kIdx]));

      // N pedido = fertilidad canónica (Q3, rango 1..24) mapeada
      // proporcionalmente a la escala de la casa-poema (1..7). Así la
      // fertilidad del día se SIENTE en el tamaño de la casa: días de
      // Q3 bajo dan casas pequeñas e íntimas; días de Q3 alto, casas
      // llenas. La rejilla 5×5 no sostiene más de ~7 recintos, de ahí
      // el tope del rango. generateHouse baja desde este N buscando la
      // mayor casa válida.
      const n = Math.max(1, Math.round(CLK.phi(kIdx) * 7 / 24));   // la escalera, mapeada a 1..7

      const house = generateHouse(seed, n);
      currentHouse = house;
      currentSeed = seed;

      pieceTitleEl.textContent = "Dear: Poems — " + bornLabel;
      document.title = "Dear: Poems — " + bornLabel;

      drawPlan(house);
      renderStats(seed, house);
    }

    function toggleUI() {
      const isOpen = uiPanel.classList.toggle("open");
      toggleUIButton.textContent = isOpen ? "Hide UI" : "Show UI";
    }

    // El usuario puede navegar entre la fecha cero (EPOCH) y hoy.
    // Ni antes (la obra no existía) ni después (el día no ha llegado).
    function onDateChange() {
      const v = dateInput.value;
      if (!v) return;
      const chosen = parseDateISO(v);
      const today = new Date();
      if (dateIsAfter(chosen, today)) {
        dateInput.value = formatDateISO(today);
        generate(today);
        return;
      }
      if (dateIsBefore(chosen, EPOCH)) {
        dateInput.value = formatDateISO(EPOCH);
        generate(EPOCH);
        return;
      }
      generate(chosen);
    }

    function goToToday() {
      const today = new Date();
      dateInput.value = formatDateISO(today);
      generate(today);
    }

    // ── Exportar a PNG A3 vertical de alta calidad ─────────────────
    //
    //   Genera dos imágenes con la fecha del día como identificador:
    //   - dear_poems_<MMM.DD.YYYY>_titled.png : con título y permutaciones
    //   - dear_poems_<MMM.DD.YYYY>.png        : planta sola
    //
    //   A3 vertical 297 × 420 mm @ 600 DPI: 7016 × 9933 px.
    function exportA3() {
      if (!currentHouse) return;
      // Versión con textos
      buildAndDownloadA3(true).then(() => {
        // Versión limpia tras un pequeño retraso para evitar que el
        // navegador agrupe las descargas.
        return new Promise(r => setTimeout(r, 350)).then(() => buildAndDownloadA3(false));
      });
    }

    function buildAndDownloadA3(withTexts) {
      const DPI = 600;
      const MM_PER_INCH = 25.4;
      const A3_W_MM = 297;
      const A3_H_MM = 420;
      const pxW = Math.round(A3_W_MM / MM_PER_INCH * DPI);
      const pxH = Math.round(A3_H_MM / MM_PER_INCH * DPI);

      const VB_W = A3_W_MM * 10;
      const VB_H = A3_H_MM * 10;
      const svgNS = SVG_NS;

      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("xmlns", svgNS);
      svg.setAttribute("viewBox", "0 0 " + VB_W + " " + VB_H);
      svg.setAttribute("width", pxW);
      svg.setAttribute("height", pxH);

      const bg = document.createElementNS(svgNS, "rect");
      bg.setAttribute("x", 0); bg.setAttribute("y", 0);
      bg.setAttribute("width", VB_W); bg.setAttribute("height", VB_H);
      bg.setAttribute("fill", "#ffffff");
      svg.appendChild(bg);

      const planMaxW = VB_W * 0.80;
      const planMaxH = VB_H * 0.65;
      const planSize = Math.min(planMaxW, planMaxH);
      const cell = planSize / GRID;
      const ox = (VB_W - cell * GRID) / 2;
      // Si no hay textos, centramos verticalmente la planta.
      const oy = withTexts ? (VB_H * 0.15) : ((VB_H - cell * GRID) / 2);

      drawPlanInto(svg, currentHouse, ox, oy, cell, svgNS);

      if (withTexts) {
        const permLines = currentHouse.perms.map(p => "(" + p.join(",") + ")");
        const permsText = permLines.join("  ");
        const footFontSize = 35;
        const footLeading  = footFontSize * 1.5;
        const footRightMargin  = 200;
        const footBottomMargin = 200;

        const titleY = VB_H - footBottomMargin - footLeading;
        const permsY = VB_H - footBottomMargin;
        const footX  = VB_W - footRightMargin;

        const titleEl = document.createElementNS(svgNS, "text");
        titleEl.setAttribute("x", footX);
        titleEl.setAttribute("y", titleY);
        titleEl.setAttribute("text-anchor", "end");
        titleEl.setAttribute("fill", "#000000");
        titleEl.setAttribute("font-family", "Futura, 'Futura PT', 'Century Gothic', 'Avenir Next', Avenir, sans-serif");
        titleEl.setAttribute("font-weight", "400");
        titleEl.setAttribute("font-size", footFontSize);
        titleEl.setAttribute("letter-spacing", "0.08em");
        titleEl.textContent = "DEAR: POEMS — " + currentSeed;
        svg.appendChild(titleEl);

        const footer = document.createElementNS(svgNS, "text");
        footer.setAttribute("x", footX);
        footer.setAttribute("y", permsY);
        footer.setAttribute("text-anchor", "end");
        footer.setAttribute("fill", "#000000");
        footer.setAttribute("font-family", "Futura, 'Futura PT', 'Century Gothic', 'Avenir Next', Avenir, sans-serif");
        footer.setAttribute("font-weight", "400");
        footer.setAttribute("font-size", footFontSize);
        footer.setAttribute("letter-spacing", "0.08em");
        footer.textContent = permsText;
        svg.appendChild(footer);
      }

      const xml = new XMLSerializer().serializeToString(svg);
      const svg64 = btoa(unescape(encodeURIComponent(xml)));
      const dataUrl = "data:image/svg+xml;base64," + svg64;

      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = function () {
          const canvas = document.createElement("canvas");
          canvas.width = pxW;
          canvas.height = pxH;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, pxW, pxH);
          ctx.drawImage(img, 0, 0, pxW, pxH);
          canvas.toBlob(function (blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            const suffix = withTexts ? "_titled" : "";
            a.download = "dear_poems_" + currentSeed + suffix + ".png";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            resolve();
          }, "image/png");
        };
        img.onerror = function (e) {
          console.error("Error al rasterizar SVG", e);
          reject(e);
        };
        img.src = dataUrl;
      });
    }

    // Render reutilizable: dibuja la planta en cualquier SVG dado.
    function drawPlanInto(svgEl, house, ox, oy, cell, ns) {
      // cuartos: fondo blanco
      house.rooms.forEach(room => {
        const r = document.createElementNS(ns, "rect");
        r.setAttribute("x", ox + room.x * cell);
        r.setAttribute("y", oy + room.y * cell);
        r.setAttribute("width", room.w * cell);
        r.setAttribute("height", room.h * cell);
        r.setAttribute("fill", "#ffffff");
        svgEl.appendChild(r);
      });

      const wallW = Math.max(6, cell * 0.045);

      // muros
      house.rooms.forEach(room => {
        const r = document.createElementNS(ns, "rect");
        r.setAttribute("x", ox + room.x * cell);
        r.setAttribute("y", oy + room.y * cell);
        r.setAttribute("width", room.w * cell);
        r.setAttribute("height", room.h * cell);
        r.setAttribute("fill", "none");
        r.setAttribute("stroke", "#000000");
        r.setAttribute("stroke-width", wallW);
        r.setAttribute("stroke-linecap", "square");
        r.setAttribute("stroke-linejoin", "miter");
        svgEl.appendChild(r);
      });

      // puertas
      const doors = computeDoors(house.rooms);
      const doorThickness = wallW * 1.2;
      doors.forEach(d => {
        const r = document.createElementNS(ns, "rect");
        if (d.side === "vertical") {
          r.setAttribute("x", ox + d.xWall * cell - doorThickness / 2);
          r.setAttribute("y", oy + d.start * cell);
          r.setAttribute("width", doorThickness);
          r.setAttribute("height", (d.end - d.start) * cell);
        } else {
          r.setAttribute("x", ox + d.start * cell);
          r.setAttribute("y", oy + d.yWall * cell - doorThickness / 2);
          r.setAttribute("width", (d.end - d.start) * cell);
          r.setAttribute("height", doorThickness);
        }
        r.setAttribute("fill", "#ffffff");
        r.setAttribute("stroke", "none");
        svgEl.appendChild(r);
      });

      // etiquetas: poema determinista de cinco líneas por recinto,
      // cuatro palabras + un silencio inscrito (línea vacía). La
      // altura total de la columna es siempre 5 líneas. Si no cabe,
      // se omite.
      house.rooms.forEach(room => {
        const cx = ox + (room.x + room.w / 2) * cell;
        const cy = oy + (room.y + room.h / 2) * cell;
        const fontSize = cell * 0.10;
        const lineHeight = fontSize * 1.5;

        const lines = poemFromPerm(room.perm);

        const visibleWords = lines.filter(w => w !== "_");
        const longestWord = visibleWords.reduce((a, b) => a.length > b.length ? a : b);
        const textW = longestWord.length * fontSize * 0.65;
        const textH = lineHeight * lines.length;  // siempre 5 líneas
        const roomW = room.w * cell;
        const roomH = room.h * cell;
        const minMargin = wallW * 1.5;

        if (textW > roomW - minMargin * 2) return;
        if (textH > roomH - minMargin * 2) return;

        const startY = cy - (lineHeight * (lines.length - 1)) / 2;
        lines.forEach((w, i) => {
          if (w === "_") return;  // silencio: línea totalmente vacía
          const t = document.createElementNS(ns, "text");
          t.setAttribute("x", cx);
          t.setAttribute("y", startY + i * lineHeight);
          t.setAttribute("text-anchor", "middle");
          t.setAttribute("dominant-baseline", "middle");
          t.setAttribute("fill", "#000000");
          t.setAttribute("font-family", "Futura, 'Futura PT', 'Century Gothic', 'Avenir Next', Avenir, sans-serif");
          t.setAttribute("font-weight", "700");
          t.setAttribute("font-size", fontSize);
          t.setAttribute("letter-spacing", "0.06em");
          t.textContent = w.toUpperCase();
          svgEl.appendChild(t);
        });
      });
    }

    toggleUIButton.addEventListener("click", toggleUI);
    todayButton.addEventListener("click", goToToday);
    dateInput.addEventListener("change", onDateChange);
    document.getElementById("exportButton").addEventListener("click", exportA3);

    // Inicializar con la fecha de hoy. Bloquear navegación fuera
    // del rango [EPOCH, hoy] en el calendario nativo del input.
    (function init() {
      const today = new Date();
      dateInput.min = formatDateISO(new Date(CLK.times[0]));
      dateInput.max = formatDateISO(today);
      dateInput.value = formatDateISO(today);
      generate(today);
    })();
  })();
  </script>

<script>
document.addEventListener('keydown', function(e){
  if(e.key!=='ArrowLeft' && e.key!=='ArrowRight') return;
  var cur = (typeof window.CLK_CUR==='number') ? window.CLK_CUR : CLK.idxAt(Date.now());
  var nk = Math.max(0, Math.min(CLK.count-1, cur + (e.key==='ArrowRight'?1:-1)));
  if(nk!==cur && typeof generate==='function'){ generate(new Date(CLK.times[nk]+1000)); }
});
</script>
